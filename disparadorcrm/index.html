<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Disparador CRM PRO - PetLojas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap'); body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter">DISPARADOR <span class="text-emerald-600">CRM PRO</span></h1>
            <div id="status-timer" class="hidden bg-emerald-100 text-emerald-700 px-6 py-2 rounded-2xl font-black flex items-center gap-3">
                <i class="fa-solid fa-clock animate-spin"></i> <span id="timer-countdown">00s</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-lg font-bold text-slate-700"><i class="fa-solid fa-layer-group text-blue-500 mr-2"></i> Matriz de Mensagens</h2>
                <div class="grid grid-cols-1 gap-4">
                    <textarea id="msg-1" class="w-full border p-3 rounded-xl h-20 text-sm" placeholder="Mensagem 01 - Use {nome}"></textarea>
                    <textarea id="msg-2" class="w-full border p-3 rounded-xl h-20 text-sm" placeholder="Mensagem 02 - Use {nome}"></textarea>
                    <textarea id="msg-3" class="w-full border p-3 rounded-xl h-20 text-sm" placeholder="Mensagem 03 - Use {nome}"></textarea>
                    <textarea id="msg-4" class="w-full border p-3 rounded-xl h-20 text-sm" placeholder="Mensagem 04 - Use {nome}"></textarea>
                    <textarea id="msg-5" class="w-full border p-3 rounded-xl h-20 text-sm" placeholder="Mensagem 05 - Use {nome}"></textarea>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-xl">
                <h3 class="text-xl font-black mb-4">Fila de Prospecção</h3>
                <div id="lista-contatos" class="space-y-3 max-h-80 overflow-y-auto mb-6 pr-2"></div>
                <button id="btn-main-action" onclick="processarProximo()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg transition transform active:scale-95">INICIAR DISPAROS</button>
                <p class="text-[10px] text-slate-400 text-center mt-4 uppercase font-bold">Delay Ativo: 10s a 20s (Segurança)</p>
            </div>
        </div>
    </div>
    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBjuvcJvTWw7lMrIwej5lHbIUXe99lJDN4",
            authDomain: "crmpetshop.firebaseapp.com",
            projectId: "crmpetshop",
            storageBucket: "crmpetshop.firebasestorage.app",
            messagingSenderId: "381013124221",
            appId: "1:381013124221:web:6a1860b4249c2939b6fd14"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let leads = []; let indexAtual = 0; let ultimaMsg = 0;

        async function carregarLeads() {
            const qs = await getDocs(collection(db, "leads"));
            leads = []; qs.forEach(doc => leads.push(doc.data()));
            renderizar();
        }

        function renderizar() {
            document.getElementById('lista-contatos').innerHTML = leads.map((l, i) => `
                <div class="p-3 rounded-xl border ${i === indexAtual ? 'border-emerald-500 bg-emerald-50' : 'border-slate-100 bg-slate-50'} flex justify-between items-center text-xs">
                    <div><strong>${l.responsavel || l.nomeLoja}</strong><br>${l.telefone}</div>
                    ${i < indexAtual ? '✅' : ''}
                </div>`).join('');
        }

        window.processarProximo = () => {
            if (indexAtual >= leads.length) return alert("Fim da fila!");
            let msgIdx; do { msgIdx = Math.floor(Math.random() * 5) + 1; } while(msgIdx === ultimaMsg);
            ultimaMsg = msgIdx;
            const msgRaw = document.getElementById(`msg-${msgIdx}`).value;
            if(!msgRaw) return alert("Campo vazio!");
            
            const l = leads[indexAtual];
            const nome = l.responsavel || l.nomeLoja || "Parceiro(a)";
            const texto = msgRaw.replace(/{nome}/g, nome);
            window.open(`https://wa.me/55${l.telefone.replace(/\D/g,'')}?text=${encodeURIComponent(texto)}`, '_blank');
            
            indexAtual++; renderizar(); iniciarTimer();
        }

        function iniciarTimer() {
            const btn = document.getElementById('btn-main-action');
            const cd = document.getElementById('timer-countdown');
            const status = document.getElementById('status-timer');
            btn.disabled = true; btn.innerText = "AGUARDE...";
            let tempo = Math.floor(Math.random() * 11) + 10;
            status.classList.remove('hidden');
            const interval = setInterval(() => {
                cd.innerText = `${--tempo}s`;
                if(tempo <= 0) {
                    clearInterval(interval); status.classList.add('hidden');
                    btn.disabled = false; btn.innerText = "PRÓXIMO DISPARO";
                    document.getElementById('beep-sound').play();
                }
            }, 1000);
        }
        carregarLeads();
    </script>
</body>
</html>

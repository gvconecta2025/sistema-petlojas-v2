<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disparador Pro - PetLojas CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .timer-active { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter">DISPARADOR <span class="text-emerald-600">CRM PRO</span></h1>
                <p class="text-slate-500 text-sm font-medium">Envio inteligente com alternância de mensagens e delay humano.</p>
            </div>
            <div id="status-timer" class="hidden bg-emerald-100 text-emerald-700 px-6 py-3 rounded-2xl font-black shadow-sm flex items-center gap-3">
                <i class="fa-solid fa-clock animate-spin"></i> 
                <span id="timer-countdown">00s</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2">
                    <i class="fa-solid fa-layer-group text-blue-500"></i> Matriz de Mensagens (Rodízio)
                </h2>
                
                <div class="grid grid-cols-1 gap-4">
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                        <label class="block text-xs font-black text-slate-400 uppercase mb-2">Mensagem 01</label>
                        <textarea id="msg-1" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition h-20" placeholder="Olá {nome}, vi sua loja..."></textarea>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                        <label class="block text-xs font-black text-slate-400 uppercase mb-2">Mensagem 02</label>
                        <textarea id="msg-2" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition h-20" placeholder="E aí {nome}, tudo bem?"></textarea>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                        <label class="block text-xs font-black text-slate-400 uppercase mb-2">Mensagem 03</label>
                        <textarea id="msg-3" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition h-20" placeholder="Bom dia {nome}, como estão as vendas?"></textarea>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                        <label class="block text-xs font-black text-slate-400 uppercase mb-2">Mensagem 04</label>
                        <textarea id="msg-4" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition h-20" placeholder="Oi {nome}, conhece o app PetLojas?"></textarea>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                        <label class="block text-xs font-black text-slate-400 uppercase mb-2">Mensagem 05</label>
                        <textarea id="msg-5" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition h-20" placeholder="Fala {nome}, tenho uma proposta..."></textarea>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-xl sticky top-8">
                    <h3 class="text-xl font-black text-slate-900 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-list-check text-emerald-500"></i> Fila de Envio
                    </h3>
                    
                    <div id="lista-contatos" class="space-y-3 max-h-[400px] overflow-y-auto mb-6 pr-2 custom-scrollbar">
                        <p class="text-slate-400 text-center text-sm italic py-8">Buscando leads no CRM...</p>
                    </div>

                    <button id="btn-main-action" onclick="processarProximo()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-200 transition-all transform active:scale-95 flex flex-col items-center justify-center">
                        <span id="btn-text">INICIAR DISPAROS</span>
                        <span id="btn-subtext" class="text-[10px] opacity-70 uppercase tracking-widest mt-1">Rodízio Aleatório Ativo</span>
                    </button>
                    
                    <p class="text-[10px] text-slate-400 text-center mt-4 font-bold uppercase tracking-wider">
                        <i class="fa-solid fa-shield-halved"></i> Delay humano: 10s - 20s
                    </p>
                </div>
            </div>
        </div>
    </div>

    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjuvcJvTWw7lMrIwej5lHbIUXe99lJDN4",
            authDomain: "crmpetshop.firebaseapp.com",
            projectId: "crmpetshop",
            storageBucket: "crmpetshop.firebasestorage.app",
            messagingSenderId: "381013124221",
            appId: "1:381013124221:web:6a1860b4249c2939b6fd14"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let leads = [];
        let indexAtual = 0;
        let ultimaMensagemSorteada = 0;

        async function carregarLeads() {
            const q = query(collection(db, "leads"), orderBy("data_atualizacao", "desc"));
            const querySnapshot = await getDocs(q);
            leads = [];
            querySnapshot.forEach((doc) => {
                leads.push({ id: doc.id, ...doc.data() });
            });
            renderizarLista();
        }

        function renderizarLista() {
            const container = document.getElementById('lista-contatos');
            if (leads.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-center text-sm py-8">Nenhum lead encontrado.</p>`;
                return;
            }

            container.innerHTML = leads.map((lead, i) => `
                <div id="card-${i}" class="p-3 rounded-xl border ${i === indexAtual ? 'border-emerald-500 bg-emerald-50 shadow-sm' : 'border-slate-100 bg-slate-50'} transition-all flex justify-between items-center">
                    <div class="min-w-0">
                        <p class="text-xs font-black text-slate-800 truncate">${lead.responsavel || lead.nomeLoja || 'Lead s/ Nome'}</p>
                        <p class="text-[10px] text-slate-500 font-math">${lead.telefone}</p>
                    </div>
                    ${i < indexAtual ? '<i class="fa-solid fa-circle-check text-emerald-500"></i>' : ''}
                    ${i === indexAtual ? '<span class="text-[8px] bg-emerald-600 text-white px-2 py-0.5 rounded-full font-bold animate-pulse">ATUAL</span>' : ''}
                </div>
            `).join('');
        }

        window.processarProximo = function() {
            if (indexAtual >= leads.length) {
                alert("Fila de disparos concluída!");
                return;
            }

            const lead = leads[indexAtual];
            const nomeTratado = lead.responsavel || lead.nomeLoja || "Parceiro(a)";
            
            // Lógica de Sorteio Aleatório de Mensagem (1 a 5)
            let msgSorteada;
            do {
                msgSorteada = Math.floor(Math.random() * 5) + 1;
            } while (msgSorteada === ultimaMensagemSorteada); // Garante que não repete a anterior
            
            ultimaMensagemSorteada = msgSorteada;
            
            const textoRaw = document.getElementById(`msg-${msgSorteada}`).value;
            if (!textoRaw) {
                alert(`A mensagem ${msgSorteada} está vazia. Preencha para disparar.`);
                return;
            }

            const textoFinal = textoRaw.replace(/{nome}/g, nomeTratado);
            const linkWa = `https://wa.me/55${lead.telefone.replace(/\D/g, '')}?text=${encodeURIComponent(textoFinal)}`;

            // Abrir WhatsApp
            window.open(linkWa, '_blank');

            // Incrementar e travar para o próximo
            indexAtual++;
            renderizarLista();
            iniciarTimer();
        };

        function iniciarTimer() {
            const btn = document.getElementById('btn-main-action');
            const statusDiv = document.getElementById('status-timer');
            const timerLabel = document.getElementById('timer-countdown');
            const beep = document.getElementById('beep-sound');

            btn.disabled = true;
            btn.classList.replace('bg-emerald-600', 'bg-slate-300');
            btn.classList.remove('hover:bg-emerald-700');
            document.getElementById('btn-text').innerText = "AGUARDE O TIMER...";

            // Sorteia tempo entre 10 e 20 segundos
            let tempo = Math.floor(Math.random() * (20 - 10 + 1)) + 10;
            
            statusDiv.classList.remove('hidden');
            timerLabel.innerText = `${tempo}s`;

            const intervalo = setInterval(() => {
                tempo--;
                timerLabel.innerText = `${tempo}s`;

                if (tempo <= 0) {
                    clearInterval(intervalo);
                    statusDiv.classList.add('hidden');
                    btn.disabled = false;
                    btn.classList.replace('bg-slate-300', 'bg-emerald-600');
                    btn.classList.add('hover:bg-emerald-700');
                    document.getElementById('btn-text').innerText = "DISPARAR PRÓXIMO";
                    
                    // Aviso Sonoro
                    beep.play();
                }
            }, 1000);
        }

        // Inicializar
        carregarLeads();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM Kanban - Miolo Integrado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        /* Fundo transparente para herdar do App Shell */
        body { font-family: 'Inter', sans-serif; background-color: transparent; }
        
        .card-ghost { opacity: 0.5; background-color: #e2e8f0; }
        .col-ghost { opacity: 0.4; border: 2px dashed #94a3b8; }
        .history-item { border-left: 2px solid #e2e8f0; padding-left: 10px; margin-bottom: 10px; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .highlight-match { background-color: #fef08a !important; color: #854d0e !important; border-radius: 4px; transition: all 0.3s ease; }
        .active-search-match { background-color: #f97316 !important; color: #ffffff !important; box-shadow: 0 0 0 3px #fed7aa; transform: scale(1.02); z-index: 10; }
        
        /* Estilo visual para campos travados */
        .locked-input { @apply cursor-not-allowed opacity-80; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden p-4 md:p-6">

    <div class="shrink-0 overflow-visible mb-4">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            
            <div class="flex flex-col lg:flex-row justify-between items-center mb-5 gap-4">
                
                <div class="flex items-center gap-3 w-full lg:w-auto">
                    <button id="btn-lock" onclick="toggleEditLock()" class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-sm whitespace-nowrap">
                        <i class="fa-solid fa-lock"></i> Edição Travada
                    </button>
                    
                    <button id="btnFilterDuplicates" onclick="toggleDuplicates()" class="hidden bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 px-3 py-2 rounded-lg text-sm font-bold transition-all items-center justify-center gap-2 shadow-sm whitespace-nowrap">
                        <i class="fa-solid fa-copy"></i> <span id="dupCountText">Duplicados (0)</span>
                    </button>
                </div>
                
                <div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto">
                    <div class="relative w-full md:w-80 flex items-center bg-slate-50 border border-slate-200 rounded-lg focus-within:ring-2 focus-within:ring-blue-500 transition-all overflow-hidden h-10 shadow-inner">
                        <i class="fa-solid fa-search text-slate-400 pl-3"></i>
                        <input type="text" id="searchInput" placeholder="Buscar Nome ou Telefone..." class="w-full pl-2 pr-2 py-2 bg-transparent focus:outline-none text-sm font-medium">
                        
                        <div id="searchControls" class="hidden items-center bg-slate-100 border-l border-slate-200 px-2 h-full shrink-0">
                            <span id="searchCounter" class="text-xs font-bold text-slate-500 mr-1 min-w-[30px] text-center">0/0</span>
                            <div class="flex flex-col">
                                <button onclick="prevSearch()" class="text-slate-400 hover:text-blue-600 transition leading-none py-0.5 px-1"><i class="fa-solid fa-caret-up text-[12px]"></i></button>
                                <button onclick="nextSearch()" class="text-slate-400 hover:text-blue-600 transition leading-none py-0.5 px-1"><i class="fa-solid fa-caret-down text-[12px]"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="flex flex-col md:flex-row gap-4 border-t border-slate-100 pt-4 items-stretch">
                
                <div id="pasteZone" class="w-full md:w-1/4 border-2 border-dashed border-slate-300 bg-slate-50 rounded-xl p-3 flex flex-col items-center justify-center transition-all cursor-text outline-none hover:border-blue-400 focus:border-blue-500 focus:bg-white text-center shadow-inner" tabindex="0">
                    <div id="pasteInitialState" class="flex flex-col items-center">
                        <i class="fa-regular fa-image text-2xl text-slate-400 mb-1"></i>
                        <p class="text-slate-700 font-bold text-sm">Criar por Print</p>
                        <p class="text-slate-500 text-[10px] mt-1">Cole do WhatsApp ou Maps (<kbd class="bg-slate-200 px-1 rounded font-mono text-slate-600">Ctrl+V</kbd>)</p>
                    </div>
                    <div id="pasteProcessingState" class="hidden flex-col items-center">
                        <i class="fa-solid fa-circle-notch fa-spin text-xl text-blue-500 mb-1"></i>
                        <p class="text-blue-700 font-bold text-xs">Lendo imagem...</p>
                    </div>
                </div>

                <div class="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-3 md:p-4 flex flex-col justify-between shadow-inner">
                    <div class="flex flex-row justify-between items-stretch mb-3 gap-4">
                        <div class="shrink-0 flex flex-col justify-between py-1">
                            <div>
                                <p class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Total de Leads</p>
                                <p class="text-xl md:text-3xl font-black text-slate-800 leading-none" id="dashTotalLeads">0</p>
                            </div>
                            <div class="mt-2">
                                <p class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Pipeline (R$)</p>
                                <p class="text-sm md:text-lg font-black text-green-600 leading-none" id="dashTotalValue">R$ 0,00</p>
                            </div>
                        </div>
                        <div id="dashMetrics" class="flex gap-2 overflow-x-auto custom-scrollbar pb-1 items-end w-full justify-end"></div>
                    </div>
                    <div class="w-full h-2.5 bg-slate-200 rounded-full overflow-hidden flex shrink-0" id="dashProgressBar"></div>
                </div>

                <div class="w-full md:w-1/3 flex flex-col justify-center bg-white border border-slate-200 p-3 rounded-xl shadow-sm">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-2">Novo Lead Manual</label>
                    <form id="manualForm" class="flex flex-col gap-2">
                        <input type="text" id="manualName" placeholder="Nome do Cliente/Loja..." class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none text-xs font-bold" required>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <input type="text" id="manualPhone" placeholder="WhatsApp..." class="w-full sm:w-1/3 border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none text-xs">
                            <input type="text" id="manualAddress" placeholder="Localização/Bairro..." class="w-full sm:flex-1 border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none text-xs">
                        </div>
                        <button type="submit" class="bg-blue-600 text-white px-3 py-2 rounded-lg hover:bg-blue-700 transition shadow-sm text-xs font-bold w-full mt-1 flex items-center justify-center">
                            <i class="fa-solid fa-plus mr-1"></i> Adicionar Lead
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-x-auto overflow-y-hidden pt-2 custom-scrollbar flex flex-col">
        <div class="flex gap-4 md:gap-6 flex-1 items-start min-h-0" id="kanbanBoard"></div>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURAÇÃO FIREBASE E VARIÁVEIS
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBjuvcJvTWw7lMrIwej5lHbIUXe99lJDN4",
            authDomain: "crmpetshop.firebaseapp.com",
            projectId: "crmpetshop",
            storageBucket: "crmpetshop.firebasestorage.app",
            messagingSenderId: "381013124221",
            appId: "1:381013124221:web:6a1860b4249c2939b6fd14"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let columnsData = [];
        let leadsData = [];
        let draggedLeadId = null;
        let draggedColId = null; 
        let expandedLeads = new Set();
        
        // Pesquisa e Trava
        let currentSearchTerm = "";
        let searchMatches = []; 
        let currentSearchIndex = -1; 
        let showOnlyDuplicates = false;
        let isEditLocked = true; // TRAVA DE SEGURANÇA ATIVADA POR PADRÃO

        const columnColors = [
            { bg: 'bg-blue-500', text: 'text-blue-600', dot: 'text-blue-500', lightBg: 'bg-blue-50' },
            { bg: 'bg-red-500', text: 'text-red-600', dot: 'text-red-500', lightBg: 'bg-red-50' },
            { bg: 'bg-slate-400', text: 'text-slate-600', dot: 'text-slate-400', lightBg: 'bg-slate-100' },
            { bg: 'bg-green-500', text: 'text-green-600', dot: 'text-green-500', lightBg: 'bg-green-50' },
            { bg: 'bg-purple-500', text: 'text-purple-600', dot: 'text-purple-500', lightBg: 'bg-purple-50' }
        ];

        const boardEl = document.getElementById('kanbanBoard');

        // ==========================================
        // 2. LÓGICA DA TRAVA DE SEGURANÇA
        // ==========================================
        window.toggleEditLock = () => {
            isEditLocked = !isEditLocked;
            const btn = document.getElementById('btn-lock');
            if (isEditLocked) {
                btn.innerHTML = `<i class="fa-solid fa-lock"></i> Edição Travada`;
                btn.className = "bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-sm whitespace-nowrap";
            } else {
                btn.innerHTML = `<i class="fa-solid fa-lock-open fa-bounce"></i> Edição Livre`;
                btn.className = "bg-green-50 text-green-600 border border-green-200 hover:bg-green-100 px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-sm whitespace-nowrap";
            }
            applyLockState();
        };

        function applyLockState() {
            // Campos de texto editáveis dentro dos cards
            document.querySelectorAll('.edit-name, .edit-phone, .edit-address, .edit-deal-value, .edit-history-item, .edit-col-title').forEach(el => {
                el.readOnly = isEditLocked;
                if(isEditLocked) el.classList.add('locked-input');
                else el.classList.remove('locked-input');
            });
            // Oculta botões de excluir coluna e excluir lead quando travado
            document.querySelectorAll('.delete-btn, .delete-col-btn').forEach(el => {
                el.style.display = isEditLocked ? 'none' : 'block';
            });
        }

        // ==========================================
        // 3. LISTENERS DO FIREBASE E RENDER
        // ==========================================
        db.collection('columns').orderBy('order').onSnapshot(snap => {
            columnsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderBoard();
        });
        db.collection('leads').onSnapshot(snap => {
            leadsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            leadsData.sort((a, b) => b.createdAt - a.createdAt);
            renderBoard();
        });

        const formatMoney = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
        
        function mascaraTelefoneInteligente(valorPuro) {
            if(!valorPuro) return '';
            let val = valorPuro.replace(/\D/g, ''); 
            if (val.startsWith('55') && val.length > 11) val = val.substring(2);
            if (val.startsWith('0')) val = val.substring(1);
            if (val.length === 0) return '';
            if (val.length <= 2) return val;
            if (val.length <= 6) return '(' + val.substring(0,2) + ') ' + val.substring(2);
            if (val.length === 10) return '(' + val.substring(0,2) + ') ' + val.substring(2,6) + '-' + val.substring(6); 
            return '(' + val.substring(0,2) + ') ' + val.substring(2,7) + '-' + val.substring(7,11); 
        }

        window.scrollToTop = (colId) => {
            const container = document.querySelector(`.kanban-scroll-container[data-col-id="${colId}"]`);
            if (container) container.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.toggleDuplicates = () => {
            showOnlyDuplicates = !showOnlyDuplicates;
            const btn = document.getElementById('btnFilterDuplicates');
            if(showOnlyDuplicates) {
                btn.classList.replace('bg-red-50', 'bg-red-500');
                btn.classList.replace('text-red-600', 'text-white');
                btn.innerHTML = `<i class="fa-solid fa-filter"></i> Isolando Repetidos`;
            } else {
                btn.classList.replace('bg-red-500', 'bg-red-50');
                btn.classList.replace('text-white', 'text-red-600');
                btn.innerHTML = `<i class="fa-solid fa-copy"></i> Duplicados`;
            }
            renderBoard();
        };

        // COLUNAS
        window.addNewColumn = async () => {
            const title = prompt("Qual o nome da nova coluna?");
            if(title && title.trim()) {
                const newId = 'col-' + Date.now();
                await db.collection('columns').doc(newId).set({ id: newId, title: title.trim(), order: columnsData.length + 1 });
            }
        };

        window.updateColumn = async (id, newTitle) => {
            if(newTitle.trim()) await db.collection('columns').doc(id).update({ title: newTitle.trim() });
        };

        window.deleteColumn = async (colId) => {
            const leadsInCol = leadsData.filter(l => l.columnId === colId);
            if (leadsInCol.length > 0) {
                alert(`⚠️ AÇÃO BLOQUEADA:\n\nEsta coluna ainda possui ${leadsInCol.length} cartão(ões).`); return;
            }
            if(confirm("Deseja excluir esta coluna permanentemente?")) {
                await db.collection('columns').doc(colId).delete();
            }
        };

        // DASHBOARD
        function updateDashboard() {
            const totalLeads = leadsData.length;
            const totalValue = leadsData.reduce((acc, l) => acc + (parseFloat(l.dealValue) || 0), 0);

            document.getElementById('dashTotalLeads').innerText = totalLeads;
            document.getElementById('dashTotalValue').innerText = formatMoney(totalValue);
            
            const metricsContainer = document.getElementById('dashMetrics');
            const progressContainer = document.getElementById('dashProgressBar');
            metricsContainer.innerHTML = ''; progressContainer.innerHTML = '';
            
            if (totalLeads === 0) return;

            columnsData.forEach((col, index) => {
                const colLeads = leadsData.filter(l => l.columnId === col.id);
                const count = colLeads.length;
                const colTotalValue = colLeads.reduce((acc, l) => acc + (parseFloat(l.dealValue) || 0), 0);
                const percentage = totalLeads > 0 ? Math.round((count / totalLeads) * 100) : 0;
                const colorTheme = columnColors[index % columnColors.length];
                const isFechado = col.title.trim().toLowerCase() === 'fechado';
                const valueColor = isFechado ? 'text-blue-500' : 'text-green-600';

                metricsContainer.innerHTML += `
                    <div class="flex flex-col bg-white border border-slate-200 rounded-lg px-2 py-1.5 shadow-sm shrink-0 min-w-[85px] md:min-w-[110px]">
                        <div class="flex items-center gap-1.5 mb-1">
                            <span class="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full ${colorTheme.bg}"></span>
                            <span class="text-[8px] md:text-[9px] font-bold text-slate-500 uppercase truncate max-w-[65px] md:max-w-[85px]" title="${col.title}">${col.title}</span>
                        </div>
                        <div class="flex items-baseline justify-between gap-2">
                            <span class="text-sm md:text-lg font-black text-slate-800 leading-none">${count}</span>
                            <span class="text-[7px] md:text-[8px] font-bold ${colorTheme.text} ${colorTheme.lightBg} px-1 rounded-sm">${percentage}%</span>
                        </div>
                        <div class="mt-1 pt-1 border-t border-slate-100">
                            <span class="text-[8px] md:text-[10px] font-black ${valueColor} truncate block">${formatMoney(colTotalValue)}</span>
                        </div>
                    </div>
                `;
                if (count > 0) progressContainer.innerHTML += `<div class="${colorTheme.bg} h-full transition-all duration-500" style="width: ${percentage}%"></div>`;
            });
        }

        // RENDER BOARD PRINCIPAL
        function renderBoard() {
            if(columnsData.length === 0) {
                boardEl.innerHTML = `<div class="flex items-center justify-center h-full w-full"><button onclick="addNewColumn()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">Criar Primeira Coluna</button></div>`;
                return;
            }

            const scrollPositions = {};
            document.querySelectorAll('.kanban-scroll-container').forEach(container => { scrollPositions[container.dataset.colId] = container.scrollTop; });

            const phoneCounts = {};
            leadsData.forEach(lead => {
                if(!lead.phone) return;
                const cleanPhone = lead.phone.replace(/\D/g, '');
                if(cleanPhone.length >= 10) phoneCounts[cleanPhone] = (phoneCounts[cleanPhone] || 0) + 1;
            });

            let duplicateCount = 0;
            leadsData.forEach(lead => {
                lead.isDuplicate = false;
                if(lead.phone) {
                    const cleanPhone = lead.phone.replace(/\D/g, '');
                    if(cleanPhone.length >= 10 && phoneCounts[cleanPhone] > 1) { lead.isDuplicate = true; duplicateCount++; }
                }
            });

            const dupBtn = document.getElementById('btnFilterDuplicates');
            if(duplicateCount > 0) {
                dupBtn.classList.remove('hidden'); dupBtn.classList.add('flex');
                if(!showOnlyDuplicates) document.getElementById('dupCountText').innerText = `Duplicados (${duplicateCount})`;
            } else {
                dupBtn.classList.add('hidden'); dupBtn.classList.remove('flex'); showOnlyDuplicates = false;
            }

            boardEl.innerHTML = '';
            updateDashboard(); 
            
            const isFitMode = columnsData.length <= 8;
            const columnWidthClass = isFitMode ? 'w-[280px] shrink-0 lg:w-auto lg:flex-1 lg:min-w-[140px] max-w-[400px]' : 'w-[280px] md:w-[320px] shrink-0';

            columnsData.forEach((col, index) => {
                const colEl = document.createElement('div');
                colEl.className = `kanban-col ${columnWidthClass} bg-slate-200/60 rounded-2xl flex flex-col border border-slate-200 h-full max-h-full transition-colors`;
                colEl.dataset.colId = col.id;
                
                colEl.draggable = true;
                colEl.addEventListener('dragstart', function(e) {
                    if (e.target === colEl) { draggedColId = this.dataset.colId; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => this.classList.add('col-ghost'), 0); }
                });
                colEl.addEventListener('dragend', function(e) { if (e.target === colEl) { this.classList.remove('col-ghost'); draggedColId = null; }});
                colEl.addEventListener('dragover', e => { e.preventDefault(); colEl.classList.add('bg-slate-300/40'); });
                colEl.addEventListener('dragleave', () => colEl.classList.remove('bg-slate-300/40'));
                colEl.addEventListener('drop', handleDrop);

                let colLeads = leadsData.filter(l => l.columnId === col.id);
                if(showOnlyDuplicates) colLeads = colLeads.filter(l => l.isDuplicate);

                const colorTheme = columnColors[index % columnColors.length];
                const isFechado = col.title.trim().toLowerCase() === 'fechado';
                const colTotalValue = colLeads.reduce((acc, l) => acc + (parseFloat(l.dealValue) || 0), 0);

                colEl.innerHTML = `
                    <div class="p-3 md:p-4 pb-2 border-b border-slate-200/50 shrink-0">
                        <div class="flex justify-between items-center mb-2 group cursor-grab">
                            <i class="fa-solid fa-grip-vertical text-slate-300 mr-2 text-xs hidden md:block"></i>
                            <input type="text" class="font-bold text-slate-700 bg-transparent border-none focus:ring-2 focus:ring-blue-400 rounded px-1 w-full outline-none transition-colors cursor-text truncate text-sm md:text-base edit-col-title" value="${col.title}" onblur="updateColumn('${col.id}', this.value)" onclick="event.stopPropagation()">
                            
                            <button onclick="deleteColumn('${col.id}')" class="text-slate-300 hover:text-red-500 transition px-1 ml-auto delete-col-btn" title="Excluir Coluna">
                                <i class="fa-solid fa-trash-can text-[10px]"></i>
                            </button>

                            <button onclick="scrollToTop('${col.id}')" class="text-slate-300 hover:text-blue-500 transition px-1 ml-1" title="Subir">
                                <i class="fa-solid fa-arrow-up text-[10px]"></i>
                            </button>
                            
                            <span class="bg-white shadow-sm ${colorTheme.text} text-xs py-0.5 px-2 rounded-full font-bold ml-1 border border-slate-200 shrink-0">${colLeads.length}</span>
                        </div>
                        <div class="text-center bg-white/50 rounded-lg p-1.5 md:p-2 border border-white/60 shadow-sm mt-1">
                            <p class="text-[8px] md:text-[9px] font-bold text-slate-400 uppercase tracking-wider">${isFechado ? 'Faturamento Atual' : 'Faturamento Possível'}</p>
                            <p class="text-xs md:text-sm font-black ${isFechado ? 'text-blue-500' : 'text-green-600'}">${formatMoney(colTotalValue)}</p>
                        </div>
                    </div>
                `;

                const container = document.createElement('div');
                container.className = 'flex-1 overflow-y-auto custom-scrollbar space-y-3 p-2 md:p-3 kanban-scroll-container relative min-h-0';
                container.dataset.colId = col.id;
                
                colLeads.forEach(lead => container.appendChild(createCard(lead, col.title)));
                if(colLeads.length === 0) container.innerHTML = `<div class="h-16 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center text-slate-400 text-xs">Vazio</div>`;
                
                colEl.appendChild(container);
                boardEl.appendChild(colEl);
            });

            document.querySelectorAll('.kanban-scroll-container').forEach(container => {
                if (scrollPositions[container.dataset.colId] !== undefined) container.scrollTop = scrollPositions[container.dataset.colId];
            });

            const addColBtn = document.createElement('div');
            addColBtn.className = 'shrink-0 h-full';
            addColBtn.innerHTML = `<button onclick="addNewColumn()" class="bg-white border-2 border-dashed border-slate-300 text-slate-500 hover:text-blue-600 hover:border-blue-400 hover:bg-blue-50 transition rounded-xl w-14 h-full flex items-center justify-center shadow-sm" title="Adicionar Coluna"><i class="fa-solid fa-plus text-xl"></i></button>`;
            boardEl.appendChild(addColBtn);
            
            applySearchHighlight(true);
            
            // REAPLICA A TRAVA CADA VEZ QUE O QUADRO RENDERIZAR
            applyLockState();
        }

        // CRIAÇÃO DO CARTÃO
        function createCard(lead, columnTitle) {
            const isExpanded = expandedLeads.has(lead.id);
            const isFechado = columnTitle.trim().toLowerCase() === 'fechado';
            
            const card = document.createElement('div');
            card.className = `bg-white rounded-xl p-3 md:p-4 shadow-sm border ${isExpanded ? 'border-blue-400 ring-1 ring-blue-100' : 'border-slate-200'} cursor-grab hover:shadow-md transition-all group relative ${lead.isDuplicate ? 'ring-2 ring-red-300' : ''}`;
            card.draggable = true;
            card.dataset.leadId = lead.id;

            card.addEventListener('dragstart', function(e) {
                e.stopPropagation(); draggedLeadId = this.dataset.leadId; setTimeout(() => this.classList.add('card-ghost'), 0);
            });
            card.addEventListener('dragend', function(e) {
                e.stopPropagation(); this.classList.remove('card-ghost'); draggedLeadId = null; 
            });

            card.innerHTML = `
                <div class="flex items-start justify-between mb-2 md:mb-3">
                    <div class="flex items-center gap-2 w-[80%]">
                        <i class="fa-solid fa-grip-vertical text-slate-300 hidden md:block"></i>
                        <input type="text" class="font-bold text-slate-800 bg-transparent w-full focus:outline-none focus:bg-slate-50 px-1 rounded edit-name truncate text-sm md:text-base" value="${lead.name}">
                    </div>
                    <button class="text-slate-400 hover:text-blue-600 transition toggle-expand bg-slate-50 rounded-full w-6 h-6 md:w-7 md:h-7 flex items-center justify-center shrink-0">
                        <i class="fa-solid ${isExpanded ? 'fa-chevron-up' : 'fa-list'} text-xs"></i>
                    </button>
                </div>

                <div class="space-y-1.5 md:space-y-2 mb-2 md:mb-3">
                    <div>
                        ${lead.isDuplicate ? `<div class="flex justify-between items-center mb-1"><span class="text-[10px] font-bold text-slate-400 uppercase">Contato</span><span class="bg-red-100 text-red-600 border border-red-200 text-[8px] font-bold px-1.5 py-0.5 rounded uppercase flex items-center gap-1 animate-pulse"><i class="fa-solid fa-triangle-exclamation"></i> Repetido</span></div>` : ''}
                        <div class="flex items-center bg-slate-50 rounded px-2 py-1 border border-transparent focus-within:border-slate-300">
                            <i class="fa-solid fa-phone text-[10px] md:text-xs text-slate-400 mr-2 phone-icon"></i>
                            <input type="text" class="bg-transparent w-full focus:outline-none edit-phone text-xs md:text-sm ${lead.isDuplicate ? 'text-red-700 font-bold' : 'text-slate-600'}" value="${lead.phone || ''}" placeholder="Celular/Fixo...">
                        </div>
                    </div>
                    
                    <div class="flex items-center bg-slate-50 rounded px-2 py-1 border border-transparent focus-within:border-slate-300">
                        <i class="fa-solid fa-location-dot text-[10px] md:text-xs text-slate-400 mr-2"></i>
                        <input type="text" class="w-full text-[10px] md:text-xs text-slate-500 bg-transparent focus:outline-none edit-address" value="${lead.address || ''}" placeholder="Endereço...">
                        <button class="text-slate-400 hover:text-blue-500 transition ml-1 px-1 map-btn" title="Abrir Maps"><i class="fa-solid fa-map-location-dot text-[10px] md:text-xs"></i></button>
                    </div>

                    <div class="flex items-center rounded px-2 py-1.5 border transition-colors ${isFechado ? 'bg-blue-50 border-blue-100' : 'bg-green-50 border-green-100'}">
                        <span class="text-[8px] md:text-[10px] font-bold text-slate-400 uppercase mr-2">Valor:</span>
                        <input type="text" class="edit-deal-value bg-transparent w-full focus:outline-none text-xs md:text-sm font-black ${isFechado ? 'text-blue-600' : 'text-green-600'} text-right" value="${formatMoney(lead.dealValue)}">
                    </div>
                </div>

                <div class="${isExpanded ? 'block' : 'hidden'} mt-3 pt-3 border-t border-slate-100">
                    <div class="flex justify-between items-center mb-2">
                        <p class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-wider">Histórico</p>
                        <button class="text-red-400 hover:text-red-600 text-[9px] md:text-[10px] uppercase font-bold delete-btn"><i class="fa-regular fa-trash-can"></i> Excluir Lead</button>
                    </div>
                    <div class="max-h-32 overflow-y-auto custom-scrollbar mb-2 space-y-2">
                        ${(lead.history || []).length > 0 ? lead.history.map((h, idx) => `
                            <div class="history-item text-[10px] md:text-xs">
                                <textarea class="w-full bg-slate-50 border-none focus:ring-0 p-1 rounded edit-history-item resize-none min-h-[30px]" data-index="${idx}">${h.text}</textarea>
                            </div>
                        `).join('') : '<p class="text-[10px] md:text-xs text-slate-400 italic">Sem notas.</p>'}
                    </div>
                    <div class="flex gap-2">
                        <input type="text" class="flex-1 text-[10px] md:text-xs border border-slate-200 rounded p-1.5 focus:ring-1 focus:ring-blue-500 outline-none new-note-input" placeholder="Nova nota rápida...">
                        <button class="bg-slate-800 text-white px-3 py-1 rounded text-xs add-note-btn"><i class="fa-solid fa-check"></i></button>
                    </div>
                </div>

                <div class="mt-3 md:mt-4 flex gap-2">
                    <a href="ficha-cadastro/index.html?id=${lead.id}" target="_blank" class="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 py-2 rounded-lg font-bold flex items-center justify-center gap-2 text-[10px] md:text-xs shadow-sm"><i class="fa-regular fa-address-book"></i> Ficha</a>
                    <button class="flex-1 ${lead.phone ? 'bg-[#25D366] hover:bg-[#1da851] text-white border border-[#25D366]' : 'bg-slate-100 text-slate-400 border border-slate-200 cursor-not-allowed'} py-2 rounded-lg font-bold flex items-center justify-center gap-2 whatsapp-btn text-[10px] md:text-xs shadow-sm"><i class="fa-brands fa-whatsapp text-sm"></i> Falar</button>
                </div>
            `;

            // Handlers
            card.querySelector('.toggle-expand').onclick = () => { isExpanded ? expandedLeads.delete(lead.id) : expandedLeads.add(lead.id); renderBoard(); };
            card.querySelector('.edit-name').onblur = (e) => updateField(lead.id, 'name', e.target.value);
            card.querySelector('.edit-address').onblur = (e) => updateField(lead.id, 'address', e.target.value);
            card.querySelector('.map-btn').onclick = () => { if(lead.address) window.open(`http://googleusercontent.com/maps.google.com/?q=${encodeURIComponent(lead.address)}`, '_blank'); };
            
            const dealInput = card.querySelector('.edit-deal-value');
            dealInput.addEventListener('input', (e) => { let val = e.target.value.replace(/\D/g, ''); e.target.value = formatMoney(val ? parseFloat(val) / 100 : 0); });
            dealInput.addEventListener('blur', (e) => { let val = e.target.value.replace(/\D/g, ''); updateField(lead.id, 'dealValue', val ? parseFloat(val) / 100 : 0); });

            const phoneInput = card.querySelector('.edit-phone');
            phoneInput.addEventListener('input', e => e.target.value = mascaraTelefoneInteligente(e.target.value));
            phoneInput.onblur = (e) => updateField(lead.id, 'phone', e.target.value);
            
            card.querySelector('.whatsapp-btn').onclick = () => {
                if(!lead.phone) return; let num = lead.phone.replace(/\D/g, '');
                if (num.length >= 10 && !num.startsWith('55')) num = '55' + num;
                window.open(`https://api.whatsapp.com/send?phone=${num}`, '_blank');
            };
            
            card.querySelector('.delete-btn').onclick = () => { if(!isEditLocked && confirm('Excluir?')) db.collection('leads').doc(lead.id).delete(); };
            
            const addNoteBtn = card.querySelector('.add-note-btn');
            if(addNoteBtn) {
                addNoteBtn.onclick = async () => {
                    const val = card.querySelector('.new-note-input').value;
                    if(!val.trim()) return;
                    const newHistory = lead.history || [];
                    newHistory.push({ text: val, createdAt: Date.now() });
                    await updateField(lead.id, 'history', newHistory);
                };
            }
            
            card.querySelectorAll('.edit-history-item').forEach(area => {
                area.onblur = async (e) => {
                    const idx = e.target.dataset.index; const newHistory = [...lead.history];
                    if(newHistory[idx].text === e.target.value) return;
                    newHistory[idx].text = e.target.value;
                    await updateField(lead.id, 'history', newHistory);
                };
            });

            return card;
        }

        async function updateField(id, field, val) { await db.collection('leads').doc(id).update({ [field]: val }); }
        
        function handleDrop(e) {
            e.preventDefault(); e.stopPropagation(); this.classList.remove('bg-slate-300/40');
            const targetColId = this.dataset.colId;
            if (draggedLeadId) updateField(draggedLeadId, 'columnId', targetColId);
            else if (draggedColId && draggedColId !== targetColId) reorderColumns(draggedColId, targetColId);
        }
        
        async function reorderColumns(sourceId, targetId) {
            const newCols = [...columnsData];
            const srcIdx = newCols.findIndex(c => c.id === sourceId);
            const tgtIdx = newCols.findIndex(c => c.id === targetId);
            const [movedCol] = newCols.splice(srcIdx, 1);
            newCols.splice(tgtIdx, 0, movedCol);
            const batch = db.batch();
            newCols.forEach((col, idx) => { batch.update(db.collection('columns').doc(col.id), { order: idx + 1 }); });
            await batch.commit();
        }

        // ==========================================
        // 4. MÓDULOS EXTRAS (Busca e Forms Manuais)
        // ==========================================
        searchInput.addEventListener('input', (e) => { currentSearchTerm = e.target.value.toLowerCase().trim(); applySearchHighlight(); });

        function applySearchHighlight() { 
            searchMatches = []; const searchDigits = currentSearchTerm.replace(/\D/g, '');
            document.querySelectorAll('.edit-name, .edit-phone').forEach(input => { 
                input.classList.remove('highlight-match', 'active-search-match'); 
                if(input.classList.contains('edit-name')) input.classList.add('text-slate-800', 'bg-transparent'); 
            });

            if (currentSearchTerm) { 
                document.querySelectorAll('[data-lead-id]').forEach(card => {
                    const nameInput = card.querySelector('.edit-name'); const phoneInput = card.querySelector('.edit-phone');
                    if (nameInput && nameInput.value.toLowerCase().includes(currentSearchTerm)) { 
                        nameInput.classList.add('highlight-match'); nameInput.classList.remove('text-slate-800', 'bg-transparent'); searchMatches.push(nameInput);
                    } 
                    if (phoneInput && phoneInput.value) {
                        const phoneDigits = phoneInput.value.replace(/\D/g, '');
                        if (phoneInput.value.toLowerCase().includes(currentSearchTerm) || (searchDigits.length > 0 && phoneDigits.includes(searchDigits))) {
                            phoneInput.classList.add('highlight-match'); searchMatches.push(phoneInput);
                        }
                    }
                });
            }

            if (searchMatches.length > 0) {
                searchControls.classList.remove('hidden'); searchControls.classList.add('flex');
                if(currentSearchIndex === -1 || currentSearchIndex >= searchMatches.length) currentSearchIndex = 0;
                focusSearchMatch(currentSearchIndex);
            } else {
                searchControls.classList.add('hidden'); searchControls.classList.remove('flex'); currentSearchIndex = -1;
            }
        }

        function focusSearchMatch(index) {
            if (searchMatches.length === 0) return;
            if (index < 0) index = searchMatches.length - 1;
            if (index >= searchMatches.length) index = 0;
            currentSearchIndex = index;
            searchCounter.innerText = `${currentSearchIndex + 1}/${searchMatches.length}`;
            searchMatches.forEach(el => el.classList.remove('active-search-match'));
            const activeEl = searchMatches[currentSearchIndex];
            activeEl.classList.add('active-search-match');
            activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        window.prevSearch = () => focusSearchMatch(currentSearchIndex - 1);
        window.nextSearch = () => focusSearchMatch(currentSearchIndex + 1);

        document.getElementById('manualForm').onsubmit = (e) => {
            e.preventDefault();
            db.collection('leads').add({ 
                name: document.getElementById('manualName').value, 
                phone: mascaraTelefoneInteligente(document.getElementById('manualPhone').value), 
                address: document.getElementById('manualAddress').value,
                dealValue: 0, columnId: columnsData[0].id, createdAt: Date.now(), history: [] 
            });
            document.getElementById('manualForm').reset();
        };

        const pasteInitial = document.getElementById('pasteInitialState');
        const pasteProcessing = document.getElementById('pasteProcessingState');
        
        document.getElementById('pasteZone').onpaste = async (e) => {
            const item = Array.from(e.clipboardData.items).find(i => i.type.includes('image'));
            if (item) {
                pasteInitial.classList.add('hidden'); pasteProcessing.classList.remove('hidden'); pasteProcessing.classList.add('flex');
                try {
                    const res = await Tesseract.recognize(item.getAsFile(), 'por');
                    const text = res.data.text; const lines = text.split('\n').map(l => l.trim());

                    let name = 'Novo Lead';
                    const palavrasIgnoradas = ['pesquise', 'google', 'maps', 'rotas', 'salvar', 'compartilhar', 'avaliaç', 'telefone', 'endereço', 'fechado', 'aberto', 'adicionar'];
                    const palavrasChavePet = ['pet', 'shop', 'agro', 'vet', 'raç', 'rac', 'bicho', 'cão', 'cao', 'gato', 'clínica', 'clinica', 'pata', 'animal'];

                    for (let i = 0; i < Math.min(lines.length, 8); i++) {
                        let linhaAtual = lines[i]; let linhaLower = linhaAtual.toLowerCase();
                        if (linhaAtual.length < 4) continue;
                        if (palavrasIgnoradas.some(w => linhaLower.includes(w))) continue;
                        if (/^\d+[,\.]\d+/.test(linhaAtual) || /^\d+\s*\(/.test(linhaAtual)) continue;
                        if (palavrasChavePet.some(w => linhaLower.includes(w))) { name = linhaAtual; break; }
                        if (name === 'Novo Lead') { name = linhaAtual; }
                    }

                    let finalPhone = '';
                    const phoneRegex = /(?:\+55\s?)?(?:\(?\d{2}\)?\s?)?\d{4,5}[-\s]?\d{4}/g;
                    const allPhones = text.match(phoneRegex);
                    if (allPhones && allPhones.length > 0) {
                        let celulares = allPhones.filter(p => {
                            let limpo = p.replace(/\D/g, ''); return limpo.length >= 10 && limpo.replace(/^55/, '').length === 11 && limpo.replace(/^55/, '')[2] === '9';
                        });
                        finalPhone = mascaraTelefoneInteligente(celulares.length > 0 ? celulares[0] : allPhones[0]);
                    }
                    
                    let addr = lines.find(l => l.match(/(rua|av|avenida|praça|rodovia|bairro|centro)/i) || l.match(/,\s*\d+/) || l.match(/\d{5}-\d{3}/)) || '';

                    await db.collection('leads').add({ 
                        name: name, phone: finalPhone, address: addr, dealValue: 0, 
                        columnId: columnsData[0].id, createdAt: Date.now(), 
                        history: [{ text: "Criado via Print do Google Maps.", createdAt: Date.now() }] 
                    });
                } catch(err) { alert("Erro ao extrair imagem."); } 
                finally { pasteInitial.classList.remove('hidden'); pasteProcessing.classList.add('hidden'); }
            }
        };
    </script>
</body>
</html>

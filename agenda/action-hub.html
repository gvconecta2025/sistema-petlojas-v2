<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Hub - PetLojas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: transparent; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Estilos das Guias Horizontais */
        .tab-btn { @apply px-4 py-1.5 text-slate-500 rounded-md text-xs font-bold transition-all duration-200 cursor-pointer flex items-center gap-2; }
        .tab-btn.active { @apply bg-white text-blue-600 shadow-sm ring-1 ring-slate-200/50; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-slate-800 p-4 md:p-6 gap-4">

    <div class="flex flex-col sm:flex-row justify-between items-center bg-white p-2 rounded-xl border border-slate-200 shadow-sm shrink-0 gap-3">
        
        <div class="flex items-center p-1 bg-slate-100 rounded-lg w-full sm:w-auto">
            <button onclick="mudarVisao('hibrida', this)" class="tab-btn active w-full sm:w-auto justify-center">
                <i class="fa-solid fa-table-columns"></i> Visão Híbrida
            </button>
            <button onclick="mudarVisao('tarefas', this)" class="tab-btn w-full sm:w-auto justify-center">
                <i class="fa-solid fa-list-check"></i> Só Tarefas
            </button>
            <button onclick="mudarVisao('agenda', this)" class="tab-btn w-full sm:w-auto justify-center hidden lg:flex">
                <i class="fa-regular fa-calendar"></i> Só Agenda
            </button>
        </div>

        <button onclick="abrirModalNovaTarefa()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-xs font-black uppercase tracking-wider flex items-center justify-center gap-2 shadow-sm shadow-blue-600/30 transition-all active:scale-95">
            <i class="fa-solid fa-plus"></i> Nova Ação
        </button>
    </div>

    <div class="flex-1 flex gap-6 overflow-hidden">
        
        <div id="coluna-tarefas" class="w-full lg:w-1/3 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-full transition-all duration-300">
            <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 rounded-t-xl shrink-0">
                <h2 class="font-bold text-sm text-slate-700"><i class="fa-solid fa-bolt text-blue-500 mr-2"></i>Ações e Follow-ups</h2>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest bg-slate-200/50 px-2 py-0.5 rounded">Tempo Real</span>
            </div>
            
            <div id="lista-tarefas" class="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar">
                <div class="p-4 text-center text-slate-400 text-xs font-bold animate-pulse">
                    <i class="fa-solid fa-circle-notch fa-spin mb-2 text-xl text-slate-300"></i><br>
                    Sincronizando tarefas...
                </div>
            </div>
        </div>

        <div id="coluna-agenda" class="flex-1 bg-white rounded-xl shadow-sm border border-slate-200 flex-col h-full overflow-hidden hidden lg:flex transition-all duration-300">
            <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 rounded-t-xl shrink-0">
                <h2 class="font-bold text-sm text-slate-700"><i class="fa-regular fa-calendar-days text-blue-500 mr-2"></i>Agenda Semanal</h2>
                <div class="flex gap-3 text-[9px] font-black text-slate-500 uppercase tracking-wider">
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-red-500"></span> Fechamento</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-yellow-500"></span> Follow-up</span>
                </div>
            </div>
            
            <div class="flex-1 flex items-center justify-center bg-slate-50/50 relative p-4">
               <div class="text-center">
                    <div class="w-16 h-16 bg-white border border-slate-200 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm">
                        <i class="fa-regular fa-calendar-check text-3xl text-slate-300"></i>
                    </div>
                    <h3 class="text-base font-bold text-slate-600 mb-1">Módulo de Calendário</h3>
                    <p class="text-xs text-slate-400 max-w-xs mx-auto font-medium">Os eventos com data marcada aparecerão aqui. Por enquanto, utilize a lista rápida de ações à esquerda para operar.</p>
               </div>
            </div>
        </div>

    </div>

    <div id="modal-nova-tarefa" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all scale-95 opacity-0 duration-300" id="modal-content">
            <div class="bg-slate-50 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-black text-sm uppercase tracking-wider text-slate-700"><i class="fa-solid fa-bolt text-blue-500 mr-2"></i>Nova Ação</h3>
                <button onclick="fecharModalNovaTarefa()" class="text-slate-400 hover:text-red-500 transition w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form id="form-nova-tarefa" class="p-6 space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5">O que precisa ser feito?</label>
                    <input type="text" id="input-titulo" required class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none font-bold text-sm text-slate-700 transition" placeholder="Ex: Ligar para PetShop X">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5">Prioridade</label>
                        <select id="input-prioridade" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm font-bold text-slate-700 transition cursor-pointer">
                            <option value="alta">🔴 Fechamento</option>
                            <option value="media">🟡 Follow-up</option>
                            <option value="baixa">⚪ Pesquisa Fria</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5">WhatsApp (Opcional)</label>
                        <input type="text" id="input-telefone" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm font-bold text-slate-700 transition" placeholder="(33) 9...">
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black uppercase tracking-widest py-3.5 rounded-lg mt-4 transition shadow-lg flex items-center justify-center gap-2 active:scale-95">
                    <i class="fa-solid fa-check"></i> Salvar Ação
                </button>
            </form>
        </div>
    </div>

    <script>
        // Lógica das Guias Horizontais (Tabs)
        function mudarVisao(modo, botao) {
            // Atualiza botões
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            botao.classList.add('active');

            const colTarefas = document.getElementById('coluna-tarefas');
            const colAgenda = document.getElementById('coluna-agenda');

            if (modo === 'hibrida') {
                colTarefas.className = 'w-full lg:w-1/3 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-full transition-all duration-300';
                colTarefas.style.display = 'flex';
                colAgenda.style.display = window.innerWidth >= 1024 ? 'flex' : 'none'; // lg:flex
            } else if (modo === 'tarefas') {
                colTarefas.className = 'w-full bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-full transition-all duration-300';
                colTarefas.style.display = 'flex';
                colAgenda.style.display = 'none';
            } else if (modo === 'agenda') {
                colTarefas.style.display = 'none';
                colAgenda.style.display = 'flex';
                colAgenda.classList.remove('hidden', 'lg:flex');
            }
        }

        // Lógica do Modal
        function abrirModalNovaTarefa() {
            const modal = document.getElementById('modal-nova-tarefa');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function fecharModalNovaTarefa() {
            const modal = document.getElementById('modal-nova-tarefa');
            const content = document.getElementById('modal-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }
    </script>
    
    <script type="module" src="agenda.js"></script>
</body>
</html>

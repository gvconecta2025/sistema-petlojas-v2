<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Hub Elite - PetLojas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Glassmorphism View Switcher */
        .view-switcher { @apply flex bg-slate-100 p-1 rounded-2xl border border-slate-200 shadow-inner; }
        .view-btn { @apply px-5 py-2 text-[11px] font-black uppercase tracking-tighter rounded-xl transition-all duration-300 flex items-center gap-2 text-slate-500 cursor-pointer; }
        .view-btn.active { @apply bg-white text-blue-600 shadow-md ring-1 ring-slate-200/50 scale-[1.02]; }

        /* Calendar Grid Engine */
        .day-column { @apply relative border-r border-slate-100 transition-colors hover:bg-slate-50/30 cursor-crosshair; }
        .event-block { @apply absolute left-1 right-1 rounded-lg p-2 text-[10px] leading-tight overflow-hidden shadow-sm border-l-[4px] transition-all hover:z-30 hover:brightness-95 cursor-pointer; }
        
        /* Task Item (Google Tasks Style) */
        .task-item { @apply flex items-start gap-3 p-3 rounded-xl border border-transparent transition-all hover:bg-slate-50 hover:border-slate-200 group cursor-default; }
        .task-action-btn { @apply opacity-0 group-hover:opacity-100 w-7 h-7 flex items-center justify-center rounded-full transition-all hover:bg-white hover:shadow-sm; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-slate-800 p-4 lg:p-6 gap-5">

    <div class="flex flex-wrap items-center justify-between bg-white/95 backdrop-blur-xl px-6 py-4 rounded-[2rem] border border-slate-200 shadow-sm shrink-0 gap-6">
        
        <button onclick="abrirModalNovaTarefa()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-[0.1em] flex items-center gap-3 shadow-lg shadow-blue-600/30 transition-all active:scale-95">
            <i class="fa-solid fa-plus text-base"></i> Nova Ação
        </button>

        <div class="flex items-center gap-5">
            <div class="flex items-center bg-slate-100 rounded-xl p-1 border border-slate-200">
                <button onclick="navegarData(-1)" class="p-2 hover:bg-white rounded-lg transition text-slate-500"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                <button onclick="irParaHoje()" class="px-5 text-[10px] font-black uppercase text-slate-600 hover:text-blue-600 transition border-x border-slate-200">Hoje</button>
                <button onclick="navegarData(1)" class="p-2 hover:bg-white rounded-lg transition text-slate-500"><i class="fa-solid fa-chevron-right text-xs"></i></button>
            </div>
            <h2 id="display-periodo" class="text-base font-black text-slate-800 min-w-[160px] text-center capitalize">Maio 2026</h2>
        </div>

        <div class="view-switcher">
            <button onclick="mudarModo('hibrida', this)" class="view-btn active"><i class="fa-solid fa-table-columns"></i> Híbrida</button>
            <button onclick="mudarModo('tarefas', this)" class="view-btn"><i class="fa-solid fa-list-check"></i> Só Tarefas</button>
            <button onclick="mudarModo('agenda', this)" class="view-btn"><i class="fa-solid fa-calendar-days"></i> Só Agenda</button>
            <div class="w-px h-4 bg-slate-200 mx-2 my-auto"></div>
            <button onclick="mudarPeriodo('dia', this)" class="view-btn">Dia</button>
            <button onclick="mudarPeriodo('semana', this)" class="view-btn active">Semana</button>
        </div>
    </div>

    <div class="flex-1 flex gap-6 overflow-hidden">
        
        <aside id="coluna-tarefas" class="w-1/4 bg-white rounded-[2rem] shadow-sm border border-slate-200 flex flex-col h-full transition-all duration-500">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 rounded-t-[2rem]">
                <h3 class="font-black text-[12px] uppercase tracking-widest text-blue-900">Suas Ações</h3>
                <span id="count-tarefas" class="bg-blue-100 text-blue-700 text-[10px] px-2.5 py-0.5 rounded-full font-black">0</span>
            </div>
            
            <div id="lista-tarefas" class="flex-1 overflow-y-auto p-4 space-y-6 custom-scrollbar">
                </div>
        </aside>

        <div id="coluna-agenda" class="flex-1 flex flex-col h-full bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden relative">
            
            <div class="flex border-b border-slate-100 bg-slate-50/30 shrink-0">
                <div class="w-14 shrink-0 border-r border-slate-100"></div>
                <div id="calendar-headers" class="flex-1 grid grid-cols-7">
                    </div>
            </div>

            <div id="all-day-wrapper" class="flex border-b border-slate-100 bg-white shrink-0 hidden">
                <div class="w-14 shrink-0 border-r border-slate-100 flex items-center justify-center text-[10px] font-black text-slate-300 uppercase">Dia</div>
                <div id="all-day-grid" class="flex-1 grid grid-cols-7 p-1.5 gap-1"></div>
            </div>
            
            <div class="flex-1 overflow-y-auto custom-scrollbar relative" id="calendar-scroll-area">
                <div class="flex h-[1440px] relative w-full">
                    
                    <div class="w-14 shrink-0 border-r border-slate-100 bg-white relative z-10" id="time-axis"></div>
                    
                    <div class="absolute inset-0 left-14 pointer-events-none z-0" id="grid-lines"></div>
                    
                    <div class="absolute left-14 right-0 h-[2px] bg-red-500 z-20 pointer-events-none hidden" id="current-time-line">
                        <div class="w-3 h-3 bg-red-500 rounded-full absolute -left-1.5 -top-[5px] shadow-sm"></div>
                    </div>
                    
                    <div class="flex-1 grid grid-cols-7 relative z-10" id="day-columns-container"></div>

                </div>
            </div>
        </div>
    </div>

    <div id="modal-nova-tarefa" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden transition-all duration-300">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md overflow-hidden transform transition-all scale-95 opacity-0 duration-300" id="modal-content">
            <div class="bg-slate-50/50 px-8 py-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-black text-sm uppercase tracking-widest text-slate-800" id="modal-title">Nova Ação</h3>
                <button onclick="fecharModalNovaTarefa()" class="text-slate-400 hover:text-red-500 transition w-10 h-10 flex items-center justify-center rounded-full hover:bg-red-50"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="form-nova-tarefa" class="p-8 space-y-5">
                <input type="hidden" id="input-id-edicao"> 
                
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Título do Compromisso</label>
                    <input type="text" id="input-titulo" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-sm" placeholder="Ex: Reunião PetShop Amigão">
                </div>
                
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-3">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Data</label>
                        <input type="date" id="input-data" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-xs text-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Início</label>
                        <input type="time" id="input-hora-inicio" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-2 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-xs text-center">
                    </div>
                    <div class="flex items-center justify-center pt-8 text-slate-300 font-black text-[10px]">ATÉ</div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Fim</label>
                        <input type="time" id="input-hora-fim" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-2 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-xs text-center">
                    </div>
                </div>
                
                <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <input type="checkbox" id="input-dia-inteiro" class="w-5 h-5 accent-blue-600 rounded-lg cursor-pointer" onchange="toggleHoras(this.checked)">
                    <label for="input-dia-inteiro" class="text-xs font-black text-slate-500 cursor-pointer uppercase tracking-tighter">Dia Inteiro / Sem hora fixa</label>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Prioridade</label>
                        <select id="input-prioridade" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-xs">
                            <option value="baixa">🔵 Normal</option>
                            <option value="media">🟡 Follow-up</option>
                            <option value="alta">🔴 Fechamento</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">WhatsApp</label>
                        <input type="text" id="input-telefone" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-xs" placeholder="(33) 9...">
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white font-black uppercase tracking-[0.2em] py-5 rounded-[1.5rem] mt-4 transition shadow-2xl active:scale-95">
                    Salvar Registro
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="agenda.js"></script>
    <script>
        // UI Helpers
        window.abrirModalNovaTarefa = (dataIso = '', horaStr = '', edicaoDoc = null) => {
            const form = document.getElementById('form-nova-tarefa');
            form.reset();
            document.getElementById('modal-title').innerText = edicaoDoc ? 'Editar Ação' : 'Nova Ação';
            
            if(edicaoDoc) {
                document.getElementById('input-id-edicao').value = edicaoDoc.id;
                document.getElementById('input-titulo').value = edicaoDoc.titulo;
                document.getElementById('input-data').value = edicaoDoc.dataMarcada || '';
                document.getElementById('input-hora-inicio').value = edicaoDoc.horaInicio || '';
                document.getElementById('input-hora-fim').value = edicaoDoc.horaFim || '';
                document.getElementById('input-prioridade').value = edicaoDoc.prioridade;
                document.getElementById('input-telefone').value = edicaoDoc.telefone || '';
                const isDia = !edicaoDoc.horaInicio;
                document.getElementById('input-dia-inteiro').checked = isDia;
                toggleHoras(isDia);
            } else {
                document.getElementById('input-id-edicao').value = '';
                if (dataIso) document.getElementById('input-data').value = dataIso;
                if (horaStr) {
                    document.getElementById('input-hora-inicio').value = horaStr;
                    document.getElementById('input-dia-inteiro').checked = false;
                    toggleHoras(false);
                } else {
                    document.getElementById('input-dia-inteiro').checked = true;
                    toggleHoras(true);
                }
            }

            document.getElementById('modal-nova-tarefa').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-content').classList.remove('scale-95', 'opacity-0');
                document.getElementById('modal-content').classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.fecharModalNovaTarefa = () => {
            const content = document.getElementById('modal-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => document.getElementById('modal-nova-tarefa').classList.add('hidden'), 300);
        };
        
        window.toggleHoras = (isDia) => {
            const hI = document.getElementById('input-hora-inicio');
            const hF = document.getElementById('input-hora-fim');
            hI.disabled = isDia; hF.disabled = isDia;
            hI.classList.toggle('opacity-30', isDia);
            hF.classList.toggle('opacity-30', isDia);
        };

        window.mudarModo = (modo, btn) => {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const colT = document.getElementById('coluna-tarefas');
            const colA = document.getElementById('coluna-agenda');
            if(modo === 'tarefas') { colT.className = 'w-full block bg-white rounded-[2rem] shadow-sm border border-slate-200 flex flex-col h-full'; colA.classList.add('hidden'); }
            else if(modo === 'agenda') { colT.classList.add('hidden'); colA.classList.remove('hidden'); }
            else { colT.className = 'w-1/4 block bg-white rounded-[2rem] shadow-sm border border-slate-200 flex flex-col h-full'; colA.classList.remove('hidden'); }
        }
    </script>
</body>
</html>

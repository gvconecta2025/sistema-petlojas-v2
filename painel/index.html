<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Revista - Módulo Integrado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        /* Fundo transparente para herdar o fundo do App Shell mestre */
        body { font-family: 'Inter', sans-serif; background-color: transparent; } 
        
        .tf-input { @apply w-full bg-white border border-gray-300 rounded-lg p-3 outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition shadow-sm; }
        .tf-label { @apply block text-sm font-bold text-gray-600 mb-1; }
        
        /* Estilos das Abas */
        .tab-active { @apply bg-blue-600 text-white font-bold border-blue-600; }
        .tab-inactive { @apply bg-white text-gray-500 font-medium border-gray-200 hover:bg-gray-50 border; }
        
        /* Animação suave */
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-6 fade-in">

    <div class="flex gap-2 mb-6">
        <button id="btn-tab-lista" onclick="window.mudarAba('lista')" class="px-6 py-2.5 rounded-lg transition-all tab-active shadow-sm flex items-center gap-2">
            <i class="fa-solid fa-list"></i> Gerenciar Artigos
        </button>
        <button id="btn-tab-editor" onclick="window.mudarAba('editor')" class="px-6 py-2.5 rounded-lg transition-all tab-inactive shadow-sm flex items-center gap-2">
            <i class="fa-solid fa-pen-to-square"></i> Editor (Novo/Agendar)
        </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
        
        <div id="aba-lista" class="space-y-4">
            <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-4">
                <h3 class="text-lg font-black text-gray-900">Artigos Publicados / Agendados</h3>
                <button onclick="window.carregarListaArtigos()" class="text-sm bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg font-bold hover:bg-gray-200 transition flex items-center gap-2">
                    <i class="fa-solid fa-rotate-right"></i> Atualizar
                </button>
            </div>
            
            <div class="overflow-x-auto border border-gray-200 rounded-xl">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wider">
                            <th class="p-4 font-bold border-b">Data/Hora</th>
                            <th class="p-4 font-bold border-b">Categoria</th>
                            <th class="p-4 font-bold border-b">Título</th>
                            <th class="p-4 font-bold border-b text-center">Status</th>
                            <th class="p-4 font-bold border-b text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-artigos" class="text-sm divide-y divide-gray-100">
                        <tr><td colspan="5" class="p-6 text-center text-gray-400 font-medium">Carregando artigos do Firebase...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="aba-editor" class="hidden">
            <form id="form-cms" class="space-y-6">
                <input type="hidden" id="art-id">

                <div class="bg-blue-50 border border-blue-200 p-4 rounded-xl flex items-center gap-3 mb-6 hidden" id="alerta-edicao">
                    <i class="fa-solid fa-pen-to-square text-blue-600 text-xl"></i>
                    <div>
                        <p class="font-bold text-blue-900 text-sm">Modo de Edição Ativo</p>
                        <p class="text-xs text-blue-700">Você está alterando um artigo já existente no banco de dados.</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="tf-label">Categoria Principal</label>
                        <select id="cat-id" required class="tf-input">
                            <option value="" disabled selected>Selecione a aba da revista...</option>
                            <option value="varejo">Pet Shop (Varejo)</option>
                            <option value="clinica">Clínica Veterinária</option>
                            <option value="estetica">Banho & Tosa</option>
                            <option value="comportamento">Adestramento</option>
                            <option value="hospedagem">Hotelzinho</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="tf-label">Tag Menor (Ex: Finanças)</label>
                        <input type="text" id="cat-nome" placeholder="Opcional..." class="tf-input">
                    </div>
                    
                    <div>
                        <label class="tf-label text-blue-600"><i class="fa-solid fa-calendar-days"></i> Data da Publicação</label>
                        <input type="datetime-local" id="art-data" class="tf-input border-blue-300 bg-blue-50/30">
                    </div>
                </div>

                <div>
                    <label class="tf-label">Título do Artigo</label>
                    <input type="text" id="art-titulo" required placeholder="Escreva o título aqui..." class="tf-input text-lg font-bold text-gray-900">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
                    <div class="md:col-span-2 space-y-6">
                        <div>
                            <label class="tf-label">Link da Imagem de Capa</label>
                            <input type="url" id="art-img" required placeholder="https://..." class="tf-input text-sm" onchange="window.atualizarPreview()">
                        </div>
                        <div>
                            <label class="tf-label">Resumo Estratégico (Chamada para o Feed)</label>
                            <textarea id="art-resumo" required rows="3" placeholder="Resumo que vai aparecer na capa da revista..." class="tf-input text-sm resize-none"></textarea>
                        </div>
                    </div>
                    
                    <div class="bg-gray-50 border border-gray-200 rounded-xl p-2 flex flex-col items-center justify-center h-48">
                        <span class="text-[10px] font-bold text-gray-400 uppercase mb-2">Preview da Capa</span>
                        <div id="preview-box" class="w-full h-full bg-gray-200 rounded-lg flex items-center justify-center overflow-hidden">
                            <i class="fa-solid fa-image text-4xl text-gray-400"></i>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="tf-label">Corpo do Artigo (HTML formatado)</label>
                    <textarea id="art-conteudo" required rows="10" placeholder="<p>Texto aqui...</p>" class="tf-input font-mono text-sm leading-relaxed bg-gray-50"></textarea>
                </div>

                <div class="flex items-center gap-3 bg-yellow-50 border border-yellow-200 p-4 rounded-xl">
                    <input type="checkbox" id="art-premium" class="w-5 h-5 text-yellow-600 rounded cursor-pointer">
                    <label for="art-premium" class="text-sm font-bold text-yellow-800 cursor-pointer flex items-center gap-1.5">
                        <i class="fa-solid fa-lock"></i> Marcar como Artigo Premium (Exige Captura de Lead)
                    </label>
                </div>

                <div class="pt-6 border-t border-gray-200 flex justify-end gap-4">
                    <button type="button" onclick="window.limparCampos()" class="px-6 py-3 text-sm font-bold text-gray-500 hover:text-gray-800 transition rounded-xl hover:bg-gray-100">
                        Cancelar / Limpar Tudo
                    </button>
                    <button type="submit" id="btn-publicar" class="bg-blue-600 hover:bg-blue-700 text-white font-black py-3 px-8 rounded-xl shadow-lg transition flex items-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Salvar no Firebase
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, Timestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CREDENCIAIS DA PETLOJAS
        const firebaseConfig = {
          apiKey: "AIzaSyBjuvcJvTWw7lMrIwej5lHbIUXe99lJDN4",
          authDomain: "crmpetshop.firebaseapp.com",
          projectId: "crmpetshop",
          storageBucket: "crmpetshop.firebasestorage.app",
          messagingSenderId: "381013124221",
          appId: "1:381013124221:web:6a1860b4249c2939b6fd14"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Expondo para o objeto Window para as funções HTML usarem
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.Timestamp = Timestamp;
        window.query = query;
        window.orderBy = orderBy;
        
        // Dispara o carregamento inicial da lista
        window.carregarListaArtigos();
    </script>

    <script>
        // Lógica de navegação de abas
        window.mudarAba = (aba) => {
            const bLista = document.getElementById('btn-tab-lista');
            const bEditor = document.getElementById('btn-tab-editor');
            const cLista = document.getElementById('aba-lista');
            const cEditor = document.getElementById('aba-editor');

            if(aba === 'lista') {
                bLista.className = "px-6 py-2.5 rounded-lg transition-all tab-active shadow-sm flex items-center gap-2";
                bEditor.className = "px-6 py-2.5 rounded-lg transition-all tab-inactive shadow-sm flex items-center gap-2";
                cLista.classList.remove('hidden');
                cEditor.classList.add('hidden');
                window.carregarListaArtigos();
            } else {
                bEditor.className = "px-6 py-2.5 rounded-lg transition-all tab-active shadow-sm flex items-center gap-2";
                bLista.className = "px-6 py-2.5 rounded-lg transition-all tab-inactive shadow-sm flex items-center gap-2";
                cEditor.classList.remove('hidden');
                cLista.classList.add('hidden');
                window.definirDataHoraPadrao();
            }
        };

        // Lógica para mostrar a imagem
        window.atualizarPreview = () => {
            const url = document.getElementById('art-img').value.trim();
            const box = document.getElementById('preview-box');
            if(url.startsWith('http')) {
                box.innerHTML = `<img src="${url}" class="w-full h-full object-cover">`;
            } else {
                box.innerHTML = `<i class="fa-solid fa-image text-4xl text-gray-400"></i>`;
            }
        };

        // Lógica para colocar a data atual se estiver vazio
        window.definirDataHoraPadrao = () => {
            const inputData = document.getElementById('art-data');
            if(!inputData.value) {
                const now = new Date();
                const tzOffset = now.getTimezoneOffset() * 60000;
                inputData.value = new Date(now.getTime() - tzOffset).toISOString().slice(0,16);
            }
        };

        // Lógica para limpar tudo
        window.limparCampos = () => {
            document.getElementById('form-cms').reset();
            document.getElementById('art-id').value = '';
            document.getElementById('alerta-edicao').classList.add('hidden');
            document.getElementById('art-data').value = '';
            window.atualizarPreview();
            window.definirDataHoraPadrao();
        };

        let listaCache = [];

        // Lógica para READ (Buscar do banco)
        window.carregarListaArtigos = async () => {
            if(!window.db) return;
            const tabela = document.getElementById('tabela-artigos');
            tabela.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-gray-400"><i class="fa-solid fa-circle-notch fa-spin"></i> Buscando no Firebase...</td></tr>`;
            
            try {
                const q = window.query(window.collection(window.db, "revista_artigos"), window.orderBy("dataPublicacao", "desc"));
                const querySnapshot = await window.getDocs(q);
                
                listaCache = [];
                let html = '';
                const agora = new Date();

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const id = doc.id;
                    listaCache.push({ id, ...data });
                    
                    let dataPub = data.dataPublicacao ? data.dataPublicacao.toDate() : new Date();
                    let dataFormatada = dataPub.toLocaleDateString('pt-BR') + ' ' + dataPub.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                    
                    let statusBadge = dataPub > agora 
                        ? `<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-sm"><i class="fa-regular fa-clock"></i> Agendado</span>`
                        : `<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-sm"><i class="fa-solid fa-check"></i> No Ar</span>`;

                    html += `
                        <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                            <td class="p-4 text-xs font-bold text-gray-500">${dataFormatada}</td>
                            <td class="p-4 text-xs font-bold text-blue-600 uppercase tracking-widest">${data.categoriaId || 'Geral'}</td>
                            <td class="p-4 font-bold text-gray-900 line-clamp-1 max-w-[250px]" title="${data.titulo}">${data.titulo}</td>
                            <td class="p-4 text-center">${statusBadge}</td>
                            <td class="p-4 text-center space-x-2">
                                <button onclick="window.editarArtigo('${id}')" class="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 p-2 rounded transition" title="Editar"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="window.excluirArtigo('${id}')" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-2 rounded transition" title="Apagar"><i class="fa-solid fa-trash-can"></i></button>
                            </td>
                        </tr>
                    `;
                });
                
                if(html === '') html = `<tr><td colspan="5" class="p-6 text-center text-gray-400 font-medium">Nenhum artigo encontrado.</td></tr>`;
                tabela.innerHTML = html;
                
            } catch (error) { 
                tabela.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-red-500 font-bold"><i class="fa-solid fa-triangle-exclamation"></i> Erro: ${error.message}</td></tr>`; 
            }
        };

        // Lógica para DELETE
        window.excluirArtigo = async (id) => {
            if(confirm("🚨 ATENÇÃO: Tem certeza que deseja apagar este artigo permanentemente?")) {
                try {
                    await window.deleteDoc(window.doc(window.db, "revista_artigos", id));
                    window.carregarListaArtigos();
                } catch(err) { 
                    alert("Erro ao excluir: " + err.message); 
                }
            }
        };

        // Lógica para PREENCHER O FORM COM DADOS ANTIGOS (Edição)
        window.editarArtigo = (id) => {
            const artigo = listaCache.find(a => a.id === id);
            if(!artigo) return;
            
            document.getElementById('art-id').value = artigo.id;
            document.getElementById('cat-id').value = artigo.categoriaId || '';
            document.getElementById('cat-nome').value = artigo.categoriaNome || '';
            document.getElementById('art-titulo').value = artigo.titulo || '';
            document.getElementById('art-img').value = artigo.img || '';
            document.getElementById('art-resumo').value = artigo.resumo || '';
            document.getElementById('art-conteudo').value = artigo.conteudo || '';
            document.getElementById('art-premium').checked = artigo.premium || false;

            if(artigo.dataPublicacao) {
                const dateObj = artigo.dataPublicacao.toDate();
                const tzOffset = dateObj.getTimezoneOffset() * 60000; 
                document.getElementById('art-data').value = (new Date(dateObj - tzOffset)).toISOString().slice(0,16);
            }

            document.getElementById('alerta-edicao').classList.remove('hidden');
            window.atualizarPreview(); 
            window.mudarAba('editor');
        };

        // Lógica de SUBMIT (Criar ou Atualizar)
        document.getElementById('form-cms').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn-publicar');
            const originalText = btn.innerHTML;
            btn.disabled = true; 
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Processando...`;

            const dataStr = document.getElementById('art-data').value;
            const dataFirebase = window.Timestamp.fromDate(new Date(dataStr));

            const artigoData = {
                categoriaId: document.getElementById('cat-id').value,
                categoriaNome: document.getElementById('cat-nome').value.trim(),
                titulo: document.getElementById('art-titulo').value.trim(),
                img: document.getElementById('art-img').value.trim(),
                resumo: document.getElementById('art-resumo').value.trim(),
                conteudo: document.getElementById('art-conteudo').value.trim(),
                premium: document.getElementById('art-premium').checked,
                dataPublicacao: dataFirebase
            };
            
            const idEdicao = document.getElementById('art-id').value;

            try {
                if(idEdicao) {
                    await window.updateDoc(window.doc(window.db, "revista_artigos", idEdicao), artigoData);
                } else {
                    await window.addDoc(window.collection(window.db, "revista_artigos"), artigoData);
                }
                window.limparCampos(); 
                window.mudarAba('lista');
            } catch (error) { 
                alert("Erro ao gravar no banco: " + error.message); 
            } finally { 
                btn.disabled = false; 
                btn.innerHTML = originalText; 
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLojas OS - Central de Inteligência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; @apply bg-gray-50; }
        #sidebar { @apply w-20 transition-all duration-300 ease-in-out overflow-hidden; }
        #sidebar:hover { @apply w-64; }
        .menu-item { @apply flex items-center gap-4 px-6 py-3.5 rounded-xl text-sm font-medium transition-all duration-200 cursor-pointer text-slate-400 hover:text-white hover:bg-slate-800 border border-transparent whitespace-nowrap; }
        .menu-item.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-900/50 border-blue-500 font-bold; }
        .menu-label { @apply opacity-0 transition-opacity duration-300; }
        #sidebar:hover .menu-label { @apply opacity-100; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="tela-login-mestre" class="fixed inset-0 bg-[#0f172a] z-[100] flex flex-col items-center justify-center p-4 fade-in">
        <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-sm w-full text-center border border-slate-100">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <i class="fa-solid fa-paw text-3xl text-white"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-900 mb-2 tracking-tight">PetLojas OS</h2>
            <p class="text-sm text-gray-500 mb-8 font-medium italic">Insira o código de acesso</p>
            <input type="password" id="senha-mestre" class="w-full bg-gray-50 border border-gray-300 rounded-2xl p-4 outline-none focus:border-blue-600 transition text-center mb-4 font-black tracking-[0.5em] text-xl" onkeypress="if(event.key === 'Enter') destravarSistema()">
            <button onclick="destravarSistema()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl transition">ACESSAR PAINEL</button>
        </div>
    </div>

    <div id="sistema-container" class="flex w-full h-full hidden opacity-0 transition-opacity duration-500">
        <aside class="bg-[#0f172a] flex flex-col shrink-0 relative z-30 shadow-2xl h-full" id="sidebar">
            <div class="h-20 flex items-center px-6 border-b border-slate-800 shrink-0">
                <i class="fa-solid fa-paw text-blue-500 text-2xl min-w-[32px] text-center"></i>
                <span class="text-white text-xl font-black tracking-tighter ml-4 menu-label">PetLojas OS</span>
            </div>
            <nav class="flex-1 overflow-y-auto py-6 px-2 space-y-2">
                <a onclick="mudarModulo(this, 'welcome')" class="menu-item active"><i class="fa-solid fa-chart-pie min-w-[20px] text-center text-lg"></i> <span class="menu-label">Dashboard</span></a>
                <a onclick="mudarModulo(this, 'crm.html')" class="menu-item"><i class="fa-solid fa-table-columns min-w-[20px] text-center text-lg"></i> <span class="menu-label">CRM Kanban</span></a>
                <a onclick="mudarModulo(this, 'ficha-cadastro/index.html')" class="menu-item"><i class="fa-solid fa-address-book min-w-[20px] text-center text-lg"></i> <span class="menu-label">Painel de Fichas</span></a>
                <a onclick="mudarModulo(this, 'disparadorcrm/index.html')" class="menu-item text-emerald-400"><i class="fa-solid fa-paper-plane min-w-[20px] text-center text-lg"></i> <span class="menu-label">Disparador CRM</span></a>
                <a onclick="mudarModulo(this, 'disparofive/index.html')" class="menu-item text-amber-400"><i class="fa-solid fa-rocket min-w-[20px] text-center text-lg"></i> <span class="menu-label">Disparo Five</span></a>
                <a onclick="mudarModulo(this, 'landingpage/index.html')" class="menu-item text-blue-400"><i class="fa-solid fa-pager min-w-[20px] text-center text-lg"></i> <span class="menu-label">Landing Page</span></a>
                <a onclick="mudarModulo(this, 'relatorios/index.html')" class="menu-item text-rose-400"><i class="fa-solid fa-chart-line min-w-[20px] text-center text-lg"></i> <span class="menu-label">Radar Analytics</span></a>
                <a onclick="mudarModulo(this, 'painel/index.html')" class="menu-item text-purple-400"><i class="fa-solid fa-pen-nib min-w-[20px] text-center text-lg"></i> <span class="menu-label">CMS Revista</span></a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 h-screen relative">
            <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 z-20 shrink-0 shadow-sm relative">
                <h2 id="topbar-title" class="text-lg font-black text-gray-800 tracking-tight">Dashboard Central</h2>
                <button onclick="location.reload()" class="w-8 h-8 text-slate-400 hover:text-blue-600"><i class="fa-solid fa-rotate"></i></button>
            </header>
            <main class="flex-1 relative overflow-hidden bg-gray-50">
                <div id="welcome-screen" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center z-0">
                    <h2 class="text-4xl font-black text-gray-900 mb-3 tracking-tighter">Sistema Operacional PetLojas</h2>
                    <p class="text-gray-500 max-w-sm mx-auto mb-10 text-sm leading-relaxed font-medium">Selecione uma ferramenta no menu lateral para iniciar.</p>
                </div>
                <iframe id="app-frame" class="absolute inset-0 w-full h-full border-none z-10 hidden bg-transparent" src=""></iframe>
                <div id="loader" class="absolute inset-0 bg-white/95 backdrop-blur-sm z-20 flex items-center justify-center hidden">
                    <div class="w-12 h-12 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const SENHA_MESTRE = 'gv2026';
        function destravarSistema() {
            if(document.getElementById('senha-mestre').value === SENHA_MESTRE) {
                document.getElementById('tela-login-mestre').classList.add('hidden');
                document.getElementById('sistema-container').classList.remove('hidden');
                setTimeout(() => document.getElementById('sistema-container').classList.remove('opacity-0'), 50);
            }
        }
        function mudarModulo(elemento, url) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            elemento.classList.add('active');
            document.getElementById('topbar-title').innerText = elemento.querySelector('.menu-label').innerText;
            const iframe = document.getElementById('app-frame');
            const welcome = document.getElementById('welcome-screen');
            const loader = document.getElementById('loader');
            if(url === 'welcome') {
                iframe.classList.add('hidden');
                welcome.classList.remove('hidden');
            } else {
                welcome.classList.add('hidden');
                loader.classList.remove('hidden');
                iframe.classList.remove('hidden');
                const uniqueUrl = url + (url.includes('?') ? '&' : '?') + "refresh=" + new Date().getTime();
                iframe.src = uniqueUrl;
                iframe.onload = () => { loader.classList.add('hidden'); };
            }
        }
    </script>
</body>
</html>

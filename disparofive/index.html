<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DisparoFive - Miolo Integrado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@400;700;900&family=Poppins:wght@400;700;900&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style type="text/tailwindcss">
        /* Classes personalizadas para as fontes e fundo transparente */
        body { background-color: transparent; }
        .font-inter { font-family: 'Inter', sans-serif; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        .font-roboto { font-family: 'Roboto', sans-serif; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-6 font-inter transition-all duration-500 fade-in">

    <div id="app-container" class="w-full flex-col items-center flex h-full">

        <header class="w-full max-w-[1600px] flex flex-col md:flex-row justify-between items-center gap-4 mb-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200 shrink-0">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="absolute top-0 left-0 w-1.5 h-full bg-indigo-500 rounded-l-2xl hidden md:block"></div>
                <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 shadow-sm shrink-0 border border-indigo-100">
                    <i class="fa-solid fa-layer-group text-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black text-slate-800 leading-none">Matriz de Variações</h1>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">DisparoFive Pro</p>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-4 w-full md:w-auto justify-between md:justify-end">
                
                <div class="flex items-center bg-slate-50 p-1.5 rounded-xl border border-slate-200 flex-1 md:flex-none shadow-inner">
                    <select id="project-selector" onchange="changeProject(this.value)" class="bg-transparent font-bold text-sm text-slate-700 outline-none cursor-pointer flex-1 w-32 truncate pl-2">
                        <option>A carregar projetos...</option>
                    </select>
                    
                    <div class="flex items-center border-l border-slate-200 pl-2 ml-2 gap-1.5">
                        <button onclick="renameProject()" class="text-slate-400 hover:text-amber-500 transition-colors p-1.5 rounded hover:bg-amber-50" title="Renomear Projeto Atual">
                            <i class="fa-solid fa-pen text-xs"></i>
                        </button>
                        <button onclick="deleteProject()" class="text-slate-400 hover:text-red-500 transition-colors p-1.5 rounded hover:bg-red-50" title="Excluir Projeto Atual">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                        <button onclick="createNewProject()" class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-colors ml-1 border border-indigo-200 shadow-sm">
                            <i class="fa-solid fa-plus mr-1"></i> Novo
                        </button>
                    </div>
                </div>

                <div class="flex items-center gap-3 shrink-0">
                    <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm" title="Status da Nuvem">
                        <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></div>
                        <span id="status-global" class="text-[9px] font-black text-slate-500 uppercase tracking-widest hidden sm:inline">A sincronizar</span>
                    </div>
                    
                    <button onclick="toggleSettings()" class="w-9 h-9 bg-white text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 border border-slate-200 rounded-full transition-colors flex items-center justify-center shadow-sm" title="Configurações Visuais">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </div>
            </div>
        </header>

        <section id="settings-panel" class="hidden w-full max-w-[1600px] mb-4 bg-white p-5 rounded-2xl shadow-lg border border-indigo-100 transition-all">
            <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
                <h2 class="text-[10px] font-black text-indigo-600 uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-palette"></i> Personalização do Projeto</h2>
                <button onclick="toggleSettings()" class="text-slate-400 hover:text-red-500 bg-slate-50 hover:bg-red-50 w-6 h-6 rounded-full flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-2">Fonte Global do App:</label>
                    <select id="font-selector" onchange="changeFont(this.value)" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400 cursor-pointer shadow-sm">
                        <option value="font-sans">Padrão do Sistema</option>
                        <option value="font-poppins">Poppins (Moderna)</option>
                        <option value="font-inter">Inter (Profissional)</option>
                        <option value="font-montserrat">Montserrat (Elegante)</option>
                        <option value="font-roboto">Roboto (Clássica)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-2">Formato dos Botões de Ação:</label>
                    <select id="btn-shape-selector" onchange="changeBtnShape(this.value)" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400 cursor-pointer shadow-sm">
                        <option value="rounded-xl">Arredondado (Padrão)</option>
                        <option value="rounded-full">Pílula</option>
                        <option value="rounded-md">Quadrado Suave</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-2">Tamanho da Fonte dos Botões:</label>
                    <select id="btn-size-selector" onchange="changeBtnTextSize(this.value)" class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400 cursor-pointer shadow-sm">
                        <option value="text-[10px]">Pequeno (10px)</option>
                        <option value="text-xs">Médio (12px)</option>
                        <option value="text-sm">Grande (14px)</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="w-full max-w-[1600px] mb-6 bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-4 items-end shrink-0 relative overflow-hidden">
            <div class="absolute right-0 top-0 w-32 h-32 bg-indigo-50 rounded-full blur-3xl -z-10 -translate-y-1/2 translate-x-1/2"></div>
            
            <div class="w-full md:w-1/3 z-10">
                <label class="text-[10px] font-black text-indigo-900 uppercase tracking-widest block mb-2 flex items-center justify-between">
                    <span><i class="fa-solid fa-bolt text-amber-400 mr-1"></i> Acesso Rápido</span>
                    <span class="text-[8px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full flex items-center gap-1 border border-emerald-200 shadow-sm">
                        <i class="fa-solid fa-eye"></i> IA Lê Prints
                    </span>
                </label>
                <input type="text" id="quick-number" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-mono text-sm font-bold focus:ring-2 focus:ring-indigo-400 outline-none text-slate-800 transition-all placeholder:text-slate-400 shadow-inner" placeholder="Digite ou cole um print aqui (Ctrl+V)">
            </div>
            
            <div class="w-full md:w-2/3 flex flex-wrap sm:flex-nowrap gap-3 z-10">
                <input type="text" id="quick-link" class="flex-1 w-full sm:w-auto p-3 bg-slate-100 border border-slate-200 rounded-xl font-mono text-xs text-slate-400 outline-none cursor-not-allowed shadow-inner" readonly placeholder="https://wa.me/55...">
                
                <button id="btn-quick-whatsapp" onclick="openQuickWhatsApp()" class="bg-[#25D366] hover:bg-[#128C7E] text-white font-black px-5 py-3 rounded-xl shadow-md shadow-green-200 transition-all active:scale-95 uppercase text-[10px] tracking-widest whitespace-nowrap flex-1 sm:flex-none flex items-center justify-center gap-2">
                    <i class="fa-brands fa-whatsapp text-lg"></i> Abrir
                </button>
                
                <button id="btn-quick-copy" onclick="copyQuickLink()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black px-5 py-3 rounded-xl shadow-md shadow-indigo-200 transition-all active:scale-95 uppercase text-[10px] tracking-widest whitespace-nowrap flex-1 sm:flex-none flex items-center justify-center gap-2">
                    <i class="fa-solid fa-copy text-lg"></i> Copiar
                </button>
            </div>
        </section>

        <main id="bricks-container" class="w-full max-w-[1600px] grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 pb-10 flex-1 overflow-y-auto custom-scrollbar pr-2">
            </main>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CREDENCIAIS
        const firebaseConfig = {
            apiKey: "AIzaSyDxZcyaKlxkSSptdRTN8HRyO3P58wbd0jk",
            authDomain: "disparofire-cfbfb.firebaseapp.com",
            projectId: "disparofire-cfbfb",
            storageBucket: "disparofire-cfbfb.firebasestorage.app",
            messagingSenderId: "194928300801",
            appId: "1:194928300801:web:906db6180611ab71364100"
        };

        const appIdentifier = 'disparofive-prod';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Como removemos o Auth do módulo, usamos um ID mestre da sua operação para salvar os projetos
        const adminUserId = "admin_petlojas_v2"; 
        let unsubscribeSnapshot = null;
        window.workspace = null; 

        // Componentes UI
        const statusText = document.getElementById('status-global');
        const statusDot = document.getElementById('status-dot');

        window.showToast = (msg, isError = false) => {
            const existing = document.getElementById('custom-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.className = `fixed bottom-6 right-6 px-5 py-3.5 rounded-xl shadow-2xl font-bold text-xs text-white z-[9999] transition-all transform animate-bounce flex items-center gap-2 ${isError ? 'bg-red-500' : 'bg-slate-800'}`;
            toast.innerHTML = `<i class="fa-solid ${isError ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> ${msg}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // INICIALIZAÇÃO E SINCRONIZAÇÃO
        const createDefaultProject = (name) => {
            let t = {};
            for(let i = 1; i <= 12; i++) {
                t[i] = { title: `Variação de Copy ${i}`, msg: "", num: "", ddd: "33" };
            }
            return {
                name: name,
                settings: {
                    font: 'font-inter',
                    btnShape: 'rounded-xl',
                    btnTextSize: 'text-[10px]'
                },
                templates: t
            };
        };

        const setupDataListener = async () => {
            const docRef = doc(db, 'artifacts', appIdentifier, 'users', adminUserId, 'workspace', 'data');
            
            const snap = await getDoc(docRef);
            if (!snap.exists()) {
                let initialWorkspace = {
                    currentProject: 'proj_default',
                    projects: { 'proj_default': createDefaultProject("Campanha Padrão") }
                };
                await setDoc(docRef, initialWorkspace);
            }

            unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    window.workspace = docSnap.data();
                    applyWorkspaceToUI();
                }
                statusText.innerText = "Sincronizado";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
            }, (err) => { 
                console.error(err);
                statusText.innerText = "Erro ao Ligar"; 
                statusDot.className = "w-2 h-2 rounded-full bg-red-500 animate-ping";
            });
        };

        // Chama direto sem precisar de login
        setupDataListener();

        window.applyWorkspaceToUI = () => {
            if(!window.workspace || !window.workspace.currentProject) return;
            
            const curProj = window.workspace.projects[window.workspace.currentProject];
            if(!curProj) return;

            const sel = document.getElementById('project-selector');
            sel.innerHTML = '';
            Object.keys(window.workspace.projects).forEach(pid => {
                const opt = document.createElement('option');
                opt.value = pid;
                opt.innerText = window.workspace.projects[pid].name;
                if(pid === window.workspace.currentProject) opt.selected = true;
                sel.appendChild(opt);
            });

            const s = curProj.settings;
            document.body.classList.remove('font-sans', 'font-inter', 'font-poppins', 'font-roboto', 'font-montserrat');
            document.body.classList.add(s.font || 'font-inter');
            
            document.getElementById('font-selector').value = s.font || 'font-inter';
            document.getElementById('btn-shape-selector').value = s.btnShape || 'rounded-xl';
            document.getElementById('btn-size-selector').value = s.btnTextSize || 'text-[10px]';

            renderAllBricks();
            window.updateStaticButtons();
        };

        let saveTimeout;
        window.persistAll = () => {
            if (!window.workspace) return;
            statusText.innerText = "A gravar...";
            statusDot.className = "w-2 h-2 rounded-full bg-amber-400 animate-pulse";
            
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                const docRef = doc(db, 'artifacts', appIdentifier, 'users', adminUserId, 'workspace', 'data');
                try {
                    await setDoc(docRef, window.workspace, { merge: true });
                    statusText.innerText = "Sincronizado";
                    statusDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                } catch (e) { 
                    statusText.innerText = "Erro ao guardar";
                    statusDot.className = "w-2 h-2 rounded-full bg-red-500";
                }
            }, 800);
        };

        // AÇÕES DE PROJETOS
        window.changeProject = (projectId) => {
            window.workspace.currentProject = projectId;
            window.persistAll();
            window.applyWorkspaceToUI();
        };

        window.createNewProject = () => {
            const name = prompt("Nome da nova campanha/projeto:");
            if(!name || name.trim() === "") return;
            const newId = 'proj_' + Date.now();
            window.workspace.projects[newId] = createDefaultProject(name);
            window.workspace.currentProject = newId;
            window.persistAll();
            window.applyWorkspaceToUI();
            window.showToast("Nova Campanha Criada!");
        };

        window.renameProject = () => {
            const currentProj = window.workspace.projects[window.workspace.currentProject];
            const newName = prompt("Renomear Campanha:", currentProj.name);
            if(newName && newName.trim() !== "") {
                currentProj.name = newName.trim();
                window.persistAll();
                window.applyWorkspaceToUI();
            }
        };

        window.deleteProject = () => {
            const projectKeys = Object.keys(window.workspace.projects);
            if(projectKeys.length <= 1) return window.showToast("Não pode excluir o único projeto ativo!", true);

            const currentProj = window.workspace.projects[window.workspace.currentProject];
            if(confirm(`Tem a certeza que deseja EXCLUIR a campanha "${currentProj.name}" permanentemente?`)) {
                delete window.workspace.projects[window.workspace.currentProject];
                window.workspace.currentProject = Object.keys(window.workspace.projects)[0];
                window.persistAll();
                window.applyWorkspaceToUI();
            }
        };

        // UI & SETTINGS
        window.toggleSettings = () => document.getElementById('settings-panel').classList.toggle('hidden');

        window.changeFont = (val) => { window.workspace.projects[window.workspace.currentProject].settings.font = val; window.persistAll(); window.applyWorkspaceToUI(); };
        window.changeBtnShape = (val) => { window.workspace.projects[window.workspace.currentProject].settings.btnShape = val; window.persistAll(); window.applyWorkspaceToUI(); };
        window.changeBtnTextSize = (val) => { window.workspace.projects[window.workspace.currentProject].settings.btnTextSize = val; window.persistAll(); window.applyWorkspaceToUI(); };

        window.updateStaticButtons = () => {
            if(!window.workspace) return;
            const s = window.workspace.projects[window.workspace.currentProject].settings;
            [document.getElementById('btn-quick-copy'), document.getElementById('btn-quick-whatsapp')].forEach(btn => {
                if (btn) {
                    btn.className = btn.className.replace(/rounded-xl|rounded-lg|rounded-full|rounded-sm|rounded-md/g, '');
                    btn.classList.add(s.btnShape || 'rounded-xl');
                }
            });
        };

        // FUNÇÕES CENTRAIS
        window.copyMessageText = (id) => {
            const msg = window.workspace.projects[window.workspace.currentProject].templates[id].msg;
            if (!msg) return window.showToast("A mensagem está vazia!", true);
            const textArea = document.createElement("textarea");
            textArea.value = msg; document.body.appendChild(textArea); textArea.select(); document.execCommand('copy'); document.body.removeChild(textArea);
            window.showToast("Script copiado!");
        };

        window.syncAllPhones = (newDdd, newNum) => {
            const templates = window.workspace.projects[window.workspace.currentProject].templates;
            Object.keys(templates).forEach(i => {
                templates[i].ddd = newDdd; templates[i].num = newNum;
                let dddEl = document.getElementById(`ddd-${i}`); let numEl = document.getElementById(`num-${i}`);
                if (dddEl) dddEl.value = newDdd; if (numEl) numEl.value = newNum;
            });
            window.persistAll();
        };

        window.handleDddInput = (id) => { window.syncAllPhones(document.getElementById(`ddd-${id}`).value, window.workspace.projects[window.workspace.currentProject].templates[id].num); };

        window.handlePhoneInput = (id) => {
            let numEl = document.getElementById(`num-${id}`); let val = numEl.value;
            if(val === "Lendo print...") return;
            let digits = val.replace(/\D/g, ''); 
            if (digits.startsWith('55') && digits.length >= 12) digits = digits.substring(2);
            let finalDdd = window.workspace.projects[window.workspace.currentProject].templates[id].ddd;
            let finalNum = digits;
            if (digits.length >= 10) {
                finalDdd = digits.substring(0, 2); let newNum = digits.substring(2);
                if (newNum.length === 8) finalNum = '9' + newNum; else finalNum = newNum.substring(0, 9);
            }
            window.syncAllPhones(finalDdd, finalNum);
        };

        window.handlePhoneBlur = (id) => {
            let numEl = document.getElementById(`num-${id}`); let digits = numEl.value.replace(/\D/g, '');
            let finalDdd = window.workspace.projects[window.workspace.currentProject].templates[id].ddd; let finalNum = digits;
            if (digits.length === 8) { finalNum = '9' + digits; window.syncAllPhones(finalDdd, finalNum); }
        };

        window.handlePhonePaste = async (e, id) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    e.preventDefault(); const blob = item.getAsFile();
                    let numEl = document.getElementById(`num-${id}`); const originalValue = numEl.value;
                    numEl.value = "Lendo print...";
                    try {
                        const { data: { text } } = await Tesseract.recognize(blob, 'por');
                        const match = text.match(/(?:\+?55\s*)?(?:\(?\d{2}\)?\s*)?\d{4,5}[-\s]*\d{4}/g);
                        if (match) {
                            numEl.value = match[0]; window.handlePhoneInput(id); window.handlePhoneBlur(id); window.showToast("Número capturado da imagem!");
                        } else {
                            let digits = text.replace(/\D/g, '');
                            if (digits.startsWith('55') && digits.length >= 12) digits = digits.substring(2);
                            if (digits.length >= 8 && digits.length <= 11) {
                                numEl.value = digits; window.handlePhoneInput(id); window.handlePhoneBlur(id); window.showToast("Número capturado da imagem!");
                            } else { numEl.value = originalValue; window.showToast("Nenhum número encontrado.", true); }
                        }
                    } catch (err) { numEl.value = originalValue; window.showToast("Erro ao processar imagem.", true); }
                    return; 
                }
            }
        };

        window.disparar = (id, type) => {
            const data = window.workspace.projects[window.workspace.currentProject].templates[id];
            let cleanNum = data.num ? String(data.num).replace(/\D/g, '') : '';
            if (cleanNum.length === 8) cleanNum = '9' + cleanNum;
            const msgEncoded = encodeURIComponent(data.msg || '');
            if (!cleanNum) return window.showToast("Cole o número no Bloco " + id, true);

            if (type === 'app') window.open(`whatsapp://send?phone=55${data.ddd}${cleanNum}&text=${msgEncoded}`, '_self'); 
            else window.open(`https://web.whatsapp.com/send?phone=55${data.ddd}${cleanNum}&text=${msgEncoded}`, '_blank');
        };

        window.copiar = (id) => {
            const data = window.workspace.projects[window.workspace.currentProject].templates[id];
            let cleanNum = data.num ? String(data.num).replace(/\D/g, '') : '';
            if (cleanNum.length === 8) cleanNum = '9' + cleanNum;
            const link = `https://wa.me/55${data.ddd}${cleanNum}?text=${encodeURIComponent(data.msg || '')}`;
            
            const textArea = document.createElement("textarea");
            textArea.value = link; document.body.appendChild(textArea); textArea.select(); document.execCommand('copy'); document.body.removeChild(textArea);

            const btn = document.getElementById(`btn-copy-${id}`);
            const originalText = btn.innerHTML;
            btn.innerHTML = "<i class='fa-solid fa-check'></i> Copiado!";
            btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
            setTimeout(() => { btn.innerHTML = originalText; btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600'); }, 2000);
        };

        // RENDERIZADOR DOS BLOCOS
        const renderAllBricks = () => {
            if(!window.workspace || !window.workspace.currentProject) return;
            const s = window.workspace.projects[window.workspace.currentProject].settings;
            const t = window.workspace.projects[window.workspace.currentProject].templates;
            const container = document.getElementById('bricks-container');
            container.innerHTML = '';
            
            Object.keys(t).forEach(id => {
                const brick = document.createElement('div');
                brick.className = "bg-white rounded-2xl shadow-sm border border-slate-200 p-5 transition-all hover:shadow-md flex flex-col h-full";
                brick.innerHTML = `
                    <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-3">
                        <div class="flex items-center gap-3 flex-1">
                            <span class="bg-indigo-50 text-indigo-600 border border-indigo-100 w-8 h-8 flex items-center justify-center rounded-lg font-black text-sm shrink-0">${id}</span>
                            <input type="text" value="${t[id].title}" 
                                oninput="window.workspace.projects[window.workspace.currentProject].templates[${id}].title = this.value; persistAll()"
                                class="text-sm font-bold text-slate-700 bg-transparent border-none outline-none w-full py-1 focus:text-indigo-600 transition-colors"
                                placeholder="Nome da Variação ${id}">
                        </div>
                        <button onclick="copyMessageText(${id})" class="ml-2 p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors shrink-0 border border-transparent hover:border-indigo-100" title="Copiar Script">
                            <i class="fa-solid fa-copy text-sm"></i>
                        </button>
                    </div>

                    <textarea id="textarea-${id}"
                        oninput="window.workspace.projects[window.workspace.currentProject].templates[${id}].msg = this.value; persistAll()"
                        class="w-full h-40 p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none text-slate-700 text-sm leading-relaxed resize-none transition-colors mb-4 shadow-inner font-medium"
                        placeholder="Escreva a variação da mensagem aqui...">${t[id].msg}</textarea>
                    
                    <div class="mt-auto space-y-2 pt-2">
                        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block flex items-center justify-between mb-1">
                            <span><i class="fa-brands fa-whatsapp text-emerald-500 mr-1"></i> Disparo</span>
                            <span class="text-[7px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded border border-emerald-200 flex items-center gap-1">
                                <i class="fa-solid fa-eye"></i> Lê Prints!
                            </span>
                        </label>
                        <div class="flex gap-2">
                            <input type="number" id="ddd-${id}" value="${t[id].ddd}" 
                                oninput="window.handleDddInput(${id})"
                                class="w-14 p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-center font-bold text-slate-700 text-sm focus:ring-2 focus:ring-indigo-400 outline-none shadow-sm">
                            <input type="text" id="num-${id}" value="${t[id].num}" 
                                oninput="window.handlePhoneInput(${id})"
                                onblur="window.handlePhoneBlur(${id})"
                                onpaste="window.handlePhonePaste(event, ${id})"
                                class="flex-1 p-2.5 bg-slate-50 border border-slate-200 rounded-xl font-mono text-sm font-bold focus:ring-2 focus:ring-indigo-400 outline-none placeholder:text-slate-300 shadow-sm" 
                                placeholder="Colar Telefone">
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button onclick="disparar(${id}, 'app')" 
                                class="flex-1 bg-[#25D366] hover:bg-[#128C7E] text-white font-black py-3 ${s.btnShape || 'rounded-xl'} shadow-sm transition-all active:scale-95 flex items-center justify-center gap-2 uppercase ${s.btnTextSize || 'text-[10px]'} tracking-widest">
                                <i class="fa-brands fa-whatsapp text-sm"></i> App
                            </button>
                            <button id="btn-copy-${id}" onclick="copiar(${id})" 
                                class="flex-1 bg-white border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-600 text-slate-500 font-black py-3 ${s.btnShape || 'rounded-xl'} transition-all active:scale-95 uppercase ${s.btnTextSize || 'text-[10px]'} tracking-widest">
                                <i class="fa-solid fa-link"></i> Link
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(brick);
            });
        };

        // LÓGICA DO GERADOR RÁPIDO
        const quickNumberInput = document.getElementById('quick-number');
        const quickLinkOutput = document.getElementById('quick-link');

        const processQuickNumber = (e) => {
            let val = e.target.value; if(val === "A ler imagem com IA...") return;
            let digits = val.replace(/\D/g, ''); 
            if (digits.startsWith('55') && digits.length >= 12) digits = digits.substring(2);
            if (digits.length >= 10) {
                let ddd = digits.substring(0, 2); let num = digits.substring(2);
                if (num.length === 8) num = '9' + num; else if (num.length > 9) num = num.substring(0, 9);
                digits = ddd + num;
            }
            e.target.value = digits; quickLinkOutput.value = digits.length > 0 ? `https://wa.me/55${digits}` : '';
        };

        quickNumberInput.addEventListener('input', processQuickNumber); quickNumberInput.addEventListener('blur', processQuickNumber);
        
        quickNumberInput.addEventListener('paste', async (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    e.preventDefault(); const blob = item.getAsFile();
                    quickNumberInput.value = "Lendo print...";
                    try {
                        const { data: { text } } = await Tesseract.recognize(blob, 'por');
                        const match = text.match(/(?:\+?55\s*)?(?:\(?\d{2}\)?\s*)?\d{4,5}[-\s]*\d{4}/g);
                        if (match) { quickNumberInput.value = match[0]; processQuickNumber({ target: quickNumberInput }); window.showToast("Número extraído!"); } 
                        else {
                            let digits = text.replace(/\D/g, '');
                            if (digits.startsWith('55') && digits.length >= 12) digits = digits.substring(2);
                            if (digits.length >= 8 && digits.length <= 11) { quickNumberInput.value = digits; processQuickNumber({ target: quickNumberInput }); window.showToast("Número extraído!"); } 
                            else { quickNumberInput.value = ""; window.showToast("Nenhum número encontrado.", true); }
                        }
                    } catch (err) { quickNumberInput.value = ""; } return; 
                }
            }
        });

        window.openQuickWhatsApp = () => {
            const link = quickLinkOutput.value; if (!link) return window.showToast("Insira um número!", true);
            window.open(`whatsapp://send?phone=${link.split('wa.me/')[1]}`, '_self');
        };

        window.copyQuickLink = () => {
            const link = quickLinkOutput.value; if (!link) return window.showToast("Insira um número!", true);
            const textArea = document.createElement("textarea"); textArea.value = link; document.body.appendChild(textArea); textArea.select(); document.execCommand('copy'); document.body.removeChild(textArea); window.showToast("Copiado!");
        };

    </script>
</body>
</html>

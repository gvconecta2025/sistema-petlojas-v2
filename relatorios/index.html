<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLojas Intelligence - Analytics Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --brand: #3B5B85; --coral: #F29C5A; }
        .bg-brand { background-color: var(--brand); }
        .text-brand { color: var(--brand); }
        .card-stat { @apply bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 transition-all hover:shadow-md; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .toggle-checkbox:checked { right: 0; border-color: #3B5B85; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3B5B85; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-20">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-brand p-2 rounded-2xl text-white shadow-lg shadow-blue-100">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black text-gray-800 tracking-tighter">PetLojas <span class="text-brand">INSIGHTS</span></h1>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Painel Administrativo</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 bg-slate-100 p-2 rounded-2xl border border-slate-200">
                <span class="text-[10px] font-black text-gray-500 uppercase ml-2">Meus Dados:</span>
                <div class="relative inline-block w-12 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="toggle-mestre" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer outline-none transition-all duration-300 right-6 checked:right-0 border-gray-300 checked:border-blue-800"/>
                    <label for="toggle-mestre" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-all duration-300"></label>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="card-stat">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Leads Únicos</p>
                <h2 class="text-4xl font-black text-brand" id="stat-leads">0</h2>
            </div>
            <div class="card-stat">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Permanência Total</p>
                <h2 class="text-4xl font-black text-gray-800" id="stat-time">0s</h2>
            </div>
            <div class="card-stat">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Scroll Médio</p>
                <h2 class="text-4xl font-black text-gray-800" id="stat-scroll">0%</h2>
            </div>
            <div class="card-stat border-2 border-brand">
                <p class="text-[10px] font-black text-brand uppercase tracking-widest mb-1">Conversão Bruta</p>
                <h2 class="text-4xl font-black text-[#F29C5A]" id="stat-conv">0%</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <h3 class="font-black text-gray-800 mb-6 flex items-center gap-2 text-sm uppercase tracking-widest">
                        <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                        Performance por Origem
                    </h3>
                    <div class="h-[250px]"><canvas id="chartOrigin"></canvas></div>
                </div>
                
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <h3 class="font-black text-gray-800 mb-6 flex items-center gap-2 text-sm uppercase tracking-widest">
                        <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Termômetro de Objeções (FAQ)
                    </h3>
                    <div id="faq-list" class="space-y-4"></div>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden flex flex-col h-[700px]">
                <div class="p-6 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                    <h3 class="font-black text-gray-800 text-xs uppercase tracking-widest">Leads Qualificados</h3>
                    <span id="badge-total" class="bg-brand text-white text-[10px] font-black px-3 py-1 rounded-full">...</span>
                </div>
                <div id="leads-list" class="flex-1 overflow-y-auto divide-y divide-gray-50 custom-scroll">
                    <p class="p-8 text-center text-gray-400 italic">Sincronizando banco de dados...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-dossie" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl overflow-hidden">
            <div class="p-8 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <div>
                    <h2 class="text-2xl font-black text-gray-800">Dossiê de Comportamento</h2>
                    <p id="modal-lead-id" class="text-[10px] font-black text-brand uppercase mt-1 tracking-widest"></p>
                </div>
                <button id="close-modal" class="p-3 bg-white border border-gray-100 rounded-2xl text-gray-400 hover:text-gray-600 transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-8 max-h-[60vh] overflow-y-auto custom-scroll" id="modal-body"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAb07mX-XJYbC3gqwstrgbo1sM3QNVi8AE",
            authDomain: "landing-page-83fd1.firebaseapp.com",
            projectId: "landing-page-83fd1",
            storageBucket: "landing-page-83fd1.firebasestorage.app",
            messagingSenderId: "976746769229",
            appId: "1:976746769229:web:d5d7ed6cca06fb3bb36504",
            measurementId: "G-1T273LTG29"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let globalSessions = [];
        let myChart = null;
        const myId = localStorage.getItem('ptl_pixel_id_br'); // Captura seu ID neste navegador

        // ESCUTADOR DO FILTRO MESTRE
        document.getElementById('toggle-mestre').addEventListener('change', render);

        // FUNÇÃO DE PROCESSAMENTO CENTRAL
        function render() {
            const includeMestre = document.getElementById('toggle-mestre').checked;
            
            // FILTRO: Se desligado, remove seus dados das métricas
            const filteredSessions = globalSessions.filter(s => {
                if (includeMestre) return true;
                return s.visitante_id !== myId;
            });

            // AGRUPAMENTO: Transformar sessões em Leads Únicos
            const leadsMap = new Map();
            filteredSessions.forEach(s => {
                const id = s.visitante_id || 'Anon';
                if (!leadsMap.has(id)) {
                    leadsMap.set(id, {
                        id,
                        origem: s.referencia_lead || 'Orgânico',
                        local: s.local || { cidade: 'Vila Isa' },
                        dispositivo: s.dispositivo || 'PC',
                        tempo: s.tempo_segundos || 0,
                        scroll: s.scroll_max || 0,
                        eventos: s.eventos || [],
                        secoes: s.secoes_vistas || [],
                        data: s.data_entrada,
                        acessos: 1
                    });
                } else {
                    const l = leadsMap.get(id);
                    l.tempo += (s.tempo_segundos || 0);
                    l.scroll = Math.max(l.scroll, s.scroll_max || 0);
                    l.eventos = [...l.eventos, ...(s.eventos || [])];
                    l.secoes = [...new Set([...l.secoes, ...(s.secoes_vistas || [])])];
                    l.acessos++;
                    if (s.data_entrada?.seconds > l.data?.seconds) l.data = s.data_entrada;
                }
            });

            const leads = Array.from(leadsMap.values()).sort((a,b) => (b.data?.seconds || 0) - (a.data?.seconds || 0));

            // ATUALIZAR KPIS
            document.getElementById('stat-leads').innerText = leads.length;
            document.getElementById('stat-time').innerText = leads.length ? Math.round(leads.reduce((a,b)=>a+b.tempo,0)/leads.length) + 's' : '0s';
            document.getElementById('stat-scroll').innerText = leads.length ? Math.round(leads.reduce((a,b)=>a+b.scroll,0)/leads.length) + '%' : '0%';
            const conv = leads.filter(l => l.eventos.some(e => e.acao.includes('CLIQUE'))).length;
            document.getElementById('stat-conv').innerText = leads.length ? Math.round((conv/leads.length)*100) + '%' : '0%';
            document.getElementById('badge-total').innerText = leads.length + ' LEADS';

            // ATUALIZAR LISTA
            const list = document.getElementById('leads-list');
            list.innerHTML = leads.map(l => `
                <div class="p-6 hover:bg-blue-50/50 transition flex flex-col gap-4 border-l-4 ${l.id === myId ? 'border-amber-400 bg-amber-50/30' : 'border-transparent hover:border-brand'}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-black text-gray-800 text-lg uppercase tracking-tighter">
                                ${l.id === myId ? '👑 VOCÊ (TESTE)' : l.origem}
                            </p>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">ID: ${l.id}</p>
                        </div>
                        <span class="text-[10px] font-black text-gray-400 bg-white border px-2 py-1 rounded-lg">
                            ${l.data ? new Date(l.data.seconds * 1000).toLocaleTimeString('pt-BR') : 'Agora'}
                        </span>
                    </div>
                    <div class="flex flex-wrap items-center gap-3 text-[10px] text-gray-500 font-black uppercase">
                        <span class="bg-white px-2 py-1 rounded border">📍 ${l.local.cidade}</span>
                        <span class="bg-white px-2 py-1 rounded border">📱 ${l.dispositivo}</span>
                        <span class="bg-brand text-white px-2 py-1 rounded">🔄 ${l.acessos} VISITAS</span>
                    </div>
                    <button class="btn-dossie w-full bg-brand text-white py-3 rounded-2xl font-black text-xs shadow-md hover:brightness-110 active:scale-95 transition-all" data-id="${l.id}">
                        ANALISAR COMPORTAMENTO
                    </button>
                </div>
            `).join('');

            updateFAQ(leads);
            updateChart(leads);
        }

        // DELEGAÇÃO DE CLIQUE DO DOSSIÊ
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.btn-dossie');
            if (btn) {
                const lId = btn.getAttribute('data-id');
                const includeMestre = document.getElementById('toggle-mestre').checked;
                const leads = Array.from(globalSessions.reduce((map, s) => {
                    const id = s.visitante_id || 'Anon';
                    if (!map.has(id)) map.set(id, { id, tempo: s.tempo_segundos, scroll: s.scroll_max, eventos: s.eventos, secoes: s.secoes_vistas, origem: s.referencia_lead });
                    else {
                        const l = map.get(id);
                        l.tempo += s.tempo_segundos; l.scroll = Math.max(l.scroll, s.scroll_max);
                        l.eventos = [...l.eventos, ...s.eventos]; l.secoes = [...new Set([...l.secoes, ...s.secoes_vistas])];
                    }
                    return map;
                }, new Map()).values());
                
                const lead = leads.find(x => x.id === lId);
                if (lead) openDossieModal(lead);
            }
        });

        function openDossieModal(l) {
            document.getElementById('modal-lead-id').innerText = "ID: " + l.id;
            document.getElementById('modal-body').innerHTML = `
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-blue-50 p-6 rounded-[2rem] border border-blue-100 text-center">
                        <p class="text-[10px] font-black text-brand uppercase tracking-widest mb-1">Leitura</p>
                        <p class="text-3xl font-black text-gray-800">${l.scroll}%</p>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-[2rem] border border-gray-200 text-center">
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Tempo Focado</p>
                        <p class="text-3xl font-black text-gray-800">${l.tempo}s</p>
                    </div>
                </div>
                <h4 class="font-black text-gray-800 mb-4 uppercase text-[10px] tracking-widest opacity-50">Seções que ele visitou</h4>
                <div class="flex flex-wrap gap-2 mb-8">
                    ${(l.secoes || ['Topo']).map(s => `<span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-[10px] font-bold border border-gray-200">${s.toUpperCase()}</span>`).join('')}
                </div>
                <h4 class="font-black text-gray-800 mb-4 uppercase text-[10px] tracking-widest opacity-50">Histórico de Cliques (Eventos)</h4>
                <div class="space-y-2">
                    ${l.eventos.length ? l.eventos.map(e => `
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-gray-100 text-sm">
                            <span class="font-bold text-gray-700">${e.acao}</span>
                            <span class="text-[10px] font-black text-gray-300 uppercase">${e.hora}</span>
                        </div>
                    `).join('') : '<p class="text-center py-6 text-gray-400 text-sm italic">Nenhum clique registrado.</p>'}
                </div>
                <div class="mt-8"><a href="https://wa.me/${l.origem.replace(/\D/g,'')}" target="_blank" class="block w-full bg-brand text-white py-4 rounded-2xl text-center font-black shadow-lg">CHAMAR NO WHATSAPP</a></div>
            `;
            document.getElementById('modal-dossie').classList.remove('hidden');
        }

        document.getElementById('close-modal').onclick = () => document.getElementById('modal-dossie').classList.add('hidden');

        function updateChart(data) {
            const origins = data.reduce((acc, v) => {
                const key = v.origem === 'Orgânico' ? 'Orgânico' : 'Ativo';
                acc[key] = (acc[key] || 0) + 1;
                return acc;
            }, {});
            const ctx = document.getElementById('chartOrigin');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(origins), datasets: [{ data: Object.values(origins), backgroundColor: ['#3B5B85', '#F29C5A'], borderRadius: 15, barThickness: 50 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        function updateFAQ(data) {
            const counts = {};
            data.forEach(v => v.eventos.forEach(e => {
                if(e.acao.startsWith('FAQ:')) counts[e.acao] = (counts[e.acao] || 0) + 1;
            }));
            const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
            document.getElementById('faq-list').innerHTML = sorted.map(([k, v]) => `
                <div class="flex flex-col gap-1.5">
                    <div class="flex justify-between text-[10px] font-black uppercase tracking-widest"><span class="text-gray-500">${k.replace('FAQ: ','')}</span><span class="text-brand">${v} Cliques</span></div>
                    <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden"><div class="bg-brand h-full" style="width:${Math.min(v*20, 100)}%"></div></div>
                </div>
            `).join('');
        }

        onSnapshot(query(collection(db, "lp_acessos")), (snap) => {
            document.getElementById('status-status')?.classList.add('hidden');
            const badge = document.getElementById('status-sync');
            badge.innerText = "✓ Sincronizado";
            badge.className = "text-[10px] font-black uppercase tracking-widest text-green-600 bg-green-50 px-4 py-2 rounded-full border border-green-100";
            globalSessions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        });
    </script>
</body>
</html>

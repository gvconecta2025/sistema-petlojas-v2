<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLojas Intelligence - DATA HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --brand: #3B5B85; }
        .bg-brand { background-color: var(--brand); }
        .text-brand { color: var(--brand); }
        .card-stat { @apply bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 transition-all hover:shadow-md; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Switch Estilizado */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--brand); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-10">

    <!-- Header Central -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-brand p-2 rounded-2xl text-white shadow-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <h1 class="text-xl font-black text-gray-800 tracking-tighter uppercase">Intelligence <span class="text-brand">Hub</span></h1>
            </div>
            
            <!-- CHAVE MESTRA: MOSTRAR/ESCONDER MEUS DADOS -->
            <div class="flex items-center gap-3 bg-slate-50 px-4 py-2 rounded-2xl border border-slate-200">
                <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Incluir Meus Testes</span>
                <label class="switch">
                    <input type="checkbox" id="master-filter-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- KPIs com as 20 métricas diluídas -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="card-stat">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Leads Únicos</p>
                <h2 class="text-4xl font-black text-brand" id="kpi-leads">0</h2>
            </div>
            <div class="card-stat">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Atenção Média</p>
                <h2 class="text-4xl font-black text-gray-800" id="kpi-time">0s</h2>
            </div>
            <div class="card-stat">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Scroll Médio</p>
                <h2 class="text-4xl font-black text-gray-800" id="kpi-scroll">0%</h2>
            </div>
            <div class="card-stat border-2 border-orange-200">
                <p class="text-[10px] font-black text-orange-500 uppercase mb-1">Conversão Bruta</p>
                <h2 class="text-4xl font-black text-orange-500" id="kpi-conv">0%</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <!-- Gráfico de Origem -->
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <h3 class="font-black text-gray-700 text-xs uppercase mb-6 tracking-widest flex items-center gap-2">
                        <svg class="w-4 h-4 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                        Origem dos Acessos
                    </h3>
                    <div class="h-[250px]"><canvas id="chartOrigin"></canvas></div>
                </div>

                <!-- Ranking FAQ (Mapa de Dores) -->
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <h3 class="font-black text-gray-700 text-xs uppercase mb-6 tracking-widest flex items-center gap-2">
                        <svg class="w-4 h-4 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Interesse por Pergunta
                    </h3>
                    <div id="faq-ranking" class="space-y-4"></div>
                </div>
            </div>

            <!-- DIRETÓRIO DE LEADS ÚNICOS -->
            <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden flex flex-col h-[750px]">
                <div class="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                    <h3 class="font-black text-gray-800 text-xs uppercase tracking-widest">Leads em Tempo Real</h3>
                    <span id="sync-status" class="bg-amber-400 text-white text-[10px] font-black px-2 py-0.5 rounded-full animate-pulse">SYNC</span>
                </div>
                <div id="leads-list" class="flex-1 overflow-y-auto divide-y divide-gray-50 custom-scroll">
                    <p class="p-10 text-center text-gray-400 italic">Conectando ao Firebase...</p>
                </div>
            </div>
        </div>
    </nav>

    <!-- MODAL DOSSIÊ COMPLETO -->
    <div id="modal-dossie" class="fixed inset-0 bg-slate-900/70 backdrop-blur-md hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <div>
                    <h2 class="text-2xl font-black text-gray-800">Dossiê do Visitante</h2>
                    <p id="modal-lead-id" class="text-[10px] font-bold text-brand uppercase mt-1 tracking-widest"></p>
                </div>
                <button id="close-modal" class="p-3 hover:bg-gray-100 rounded-2xl transition"><svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-8 max-h-[65vh] overflow-y-auto custom-scroll" id="modal-body"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAb07mX-XJYbC3gqwstrgbo1sM3QNVi8AE",
            authDomain: "landing-page-83fd1.firebaseapp.com",
            projectId: "landing-page-83fd1",
            storageBucket: "landing-page-83fd1.firebasestorage.app",
            messagingSenderId: "976746769229",
            appId: "1:976746769229:web:d5d7ed6cca06fb3bb36504",
            measurementId: "G-1T273LTG29"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let rawSessions = [];
        let leadsAgrupados = [];
        let myChart = null;

        // SEU ID NESTE DISPOSITIVO (Para o filtro Master)
        const myId = localStorage.getItem('ptl_pixel_id_br');

        // Escutador do Interruptor Master
        document.getElementById('master-filter-toggle').onchange = render;

        function render() {
            const showMaster = document.getElementById('master-filter-toggle').checked;
            
            // 1. Filtragem Inteligente
            const filtered = rawSessions.filter(s => showMaster ? true : s.visitante_id !== myId);

            // 2. Agrupamento por Lead Único (Consolida as 20 métricas)
            const map = new Map();
            filtered.forEach(s => {
                const id = s.visitante_id || 'Anon';
                if (!map.has(id)) {
                    map.set(id, {
                        id,
                        origem: s.referencia_lead || 'Orgânico',
                        local: s.local || { cidade: 'Governador Valadares' },
                        dispositivo: s.dispositivo || 'PC',
                        tempo_total: s.tempo_segundos || 0,
                        scroll_max: s.scroll_max || 0,
                        eventos: s.eventos || [],
                        secoes: s.secoes_vistas || [],
                        data_recente: s.data_entrada,
                        total_acessos: 1
                    });
                } else {
                    const l = map.get(id);
                    l.tempo_total += (s.tempo_segundos || 0);
                    l.scroll_max = Math.max(l.scroll_max, s.scroll_max || 0);
                    l.eventos = [...l.eventos, ...(s.eventos || [])];
                    l.secoes = [...new Set([...l.secoes, ...(s.secoes_vistas || [])])];
                    l.total_acessos++;
                    if(s.data_entrada?.seconds > l.data_recente?.seconds) l.data_recente = s.data_entrada;
                }
            });

            leadsAgrupados = Array.from(map.values()).sort((a,b) => (b.data_recente?.seconds || 0) - (a.data_recente?.seconds || 0));

            // 3. KPI Updates
            document.getElementById('kpi-leads').innerText = leadsAgrupados.length;
            const avgT = leadsAgrupados.length ? Math.round(leadsAgrupados.reduce((a,b)=>a+b.tempo_total,0)/leadsAgrupados.length) : 0;
            document.getElementById('kpi-time').innerText = avgT + 's';
            const avgS = leadsAgrupados.length ? Math.round(leadsAgrupados.reduce((a,b)=>a+b.scroll_max,0)/leadsAgrupados.length) : 0;
            document.getElementById('kpi-scroll').innerText = avgS + '%';
            const conv = leadsAgrupados.filter(l => l.eventos.some(e => e.acao.includes('CLIQUE'))).length;
            document.getElementById('kpi-conv').innerText = leadsAgrupados.length ? Math.round((conv/leadsAgrupados.length)*100) + '%' : '0%';

            // 4. Lista de Leads (Com o seu botão CLICÁVEL)
            const list = document.getElementById('leads-list');
            list.innerHTML = leadsAgrupados.map(l => `
                <div class="p-6 hover:bg-slate-50 transition flex flex-col gap-4 border-l-4 ${l.id === myId ? 'border-amber-400 bg-amber-50/20' : 'border-transparent hover:border-brand'}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="font-black text-gray-800 text-lg leading-tight">${l.id === myId ? '👑 VOCÊ (TESTE)' : l.origem}</p>
                            <p class="text-[9px] font-bold text-gray-300 uppercase tracking-widest mt-1">ID: ${l.id}</p>
                        </div>
                        <span class="text-[10px] font-black text-gray-400 bg-white border px-2 py-1 rounded-lg">
                            ${l.data_recente ? new Date(l.data_recente.seconds * 1000).toLocaleTimeString('pt-BR') : 'Agora'}
                        </span>
                    </div>
                    <div class="flex flex-wrap items-center gap-2 text-[9px] font-black uppercase text-gray-400">
                        <span class="bg-white border px-2 py-1 rounded">📍 ${l.local.cidade}</span>
                        <span class="bg-white border px-2 py-1 rounded">📱 ${l.dispositivo}</span>
                        <span class="bg-brand text-white px-2 py-1 rounded">🔄 ${l.total_acessos} VIEWS</span>
                    </div>
                    <!-- BOTÃO RECONSTRUIDO -->
                    <button class="btn-dossie w-full bg-brand text-white py-3 rounded-2xl font-black text-xs shadow-md hover:brightness-110 active:scale-95 transition-all" data-id="${l.id}">
                        ABRIR DOSSIÊ DO LEAD
                    </button>
                </div>
            `).join('');

            updateChart(leadsAgrupados);
            updateFAQ(leadsAgrupados);
        }

        // DELEGAÇÃO DE CLIQUE: CORREÇÃO DEFINITIVA
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.btn-dossie');
            if (btn) {
                const leadId = btn.getAttribute('data-id');
                const lead = leadsAgrupados.find(x => x.id === leadId);
                if (lead) showModal(lead);
            }
        });

        function showModal(l) {
            document.getElementById('modal-lead-id').innerText = "Dossiê Lead: " + l.id;
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-blue-50 p-6 rounded-[2rem] border border-blue-100 text-center">
                        <p class="text-[10px] font-black text-brand uppercase tracking-widest mb-1">Scroll Máximo</p>
                        <p class="text-3xl font-black text-gray-800">${l.scroll_max}%</p>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-[2rem] border border-gray-100 text-center">
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Tempo Focado</p>
                        <p class="text-3xl font-black text-gray-800">${l.tempo_total}s</p>
                    </div>
                </div>

                <h4 class="font-black text-gray-800 mb-3 uppercase text-[10px] tracking-widest opacity-40 italic">Seções que ele viu</h4>
                <div class="flex flex-wrap gap-2 mb-8">
                    ${l.secoes.length ? l.secoes.map(s => `<span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-[9px] font-black border border-gray-200 uppercase">${s}</span>`).join('') : '<span class="text-xs text-gray-400">Nenhuma seção detectada</span>'}
                </div>

                <h4 class="font-black text-gray-800 mb-3 uppercase text-[10px] tracking-widest opacity-40 italic text-center">Histórico de Cliques (Eventos)</h4>
                <div class="space-y-2 mb-8">
                    ${l.eventos.length ? l.eventos.map(e => `
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-gray-100 text-sm">
                            <span class="font-bold text-gray-700">${e.acao}</span>
                            <span class="text-[10px] font-black text-gray-300 uppercase">${e.hora}</span>
                        </div>
                    `).join('') : '<p class="text-center py-6 text-gray-400 text-sm">Sem interações registradas.</p>'}
                </div>
                
                <a href="https://wa.me/${l.origem.replace(/\D/g,'')}" target="_blank" class="block w-full bg-brand text-white py-5 rounded-3xl text-center font-black shadow-xl hover:scale-[1.02] transition-all uppercase tracking-widest">Abordar Lead agora</a>
            `;
            document.getElementById('modal-dossie').classList.remove('hidden');
        }

        document.getElementById('close-modal').onclick = () => document.getElementById('modal-dossie').classList.add('hidden');

        function updateChart(data) {
            const ctx = document.getElementById('chartOrigin');
            const counts = data.reduce((acc, l) => {
                const k = l.origem === 'Orgânico' ? 'Orgânico' : 'Tráfego Ativo';
                acc[k] = (acc[k] || 0) + 1;
                return acc;
            }, {});
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#3B5B85', '#F29C5A'], borderRadius: 15 }] },
                options: { maintainAspectRatio: false, plugins: { legend: false }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        function updateFAQ(data) {
            const counts = {};
            data.forEach(l => l.eventos.forEach(e => {
                if(e.acao.startsWith('FAQ:')) counts[e.acao] = (counts[e.acao] || 0) + 1;
            }));
            const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
            document.getElementById('faq-ranking').innerHTML = sorted.map(([k, v]) => `
                <div class="flex flex-col gap-1.5">
                    <div class="flex justify-between text-[10px] font-black uppercase"><span class="text-gray-500">${k.replace('FAQ: ','')}</span><span class="text-brand">${v} Cliques</span></div>
                    <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden"><div class="bg-brand h-full transition-all duration-1000" style="width:${Math.min(v*20, 100)}%"></div></div>
                </div>
            `).join('');
        }

        onSnapshot(query(collection(db, "lp_acessos")), (snap) => {
            const badge = document.getElementById('status-sync');
            badge.innerText = "✓ Sincronizado";
            badge.className = "text-[10px] font-black uppercase tracking-widest text-green-600 bg-green-50 px-4 py-2 rounded-full border border-green-100";
            rawSessions = snap.docs.map(d => d.data());
            render();
        });
    </script>
</body>
</html>

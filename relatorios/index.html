<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Radar Analytics PRO - PetLojas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .font-math { font-family: 'JetBrains Mono', monospace; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h1 class="text-2xl font-black text-slate-900 flex items-center gap-3">
            <i class="fa-solid fa-radar text-rose-500 animate-pulse"></i> Telemetria de Tráfego
        </h1>
        <button onclick="carregarDados()" class="bg-slate-900 text-white px-6 py-2 rounded-xl text-sm font-bold flex items-center gap-2">
            <i class="fa-solid fa-rotate" id="icon-refresh"></i> Atualizar Matriz
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
            <span class="text-[10px] font-bold text-slate-400 uppercase">Volume (n)</span>
            <span class="text-3xl font-black font-math mt-1" id="kpi-sessoes">0</span>
        </div>
        <div class="bg-indigo-600 p-5 rounded-2xl text-white shadow-lg flex flex-col">
            <span class="text-[10px] font-bold text-indigo-200 uppercase">Conversão ($C_{rate}$)</span>
            <span class="text-3xl font-black font-math mt-1" id="kpi-conversao">0%</span>
        </div>
        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
            <span class="text-[10px] font-bold text-slate-400 uppercase">Tempo Ativo ($\bar{x}$)</span>
            <span class="text-3xl font-black font-math mt-1" id="kpi-tempo">0s</span>
        </div>
        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
            <span class="text-[10px] font-bold text-slate-400 uppercase">Scroll ($\bar{x}$)</span>
            <span class="text-3xl font-black font-math mt-1" id="kpi-scroll">0%</span>
        </div>
        <div class="bg-white p-5 rounded-2xl border border-rose-100 flex flex-col bg-rose-50/20">
            <span class="text-[10px] font-bold text-rose-400 uppercase">Rage Clicks</span>
            <span class="text-3xl font-black font-math mt-1 text-rose-700" id="kpi-rage">0</span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-64"><canvas id="graficoOrigem"></canvas></div>
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-64 flex justify-center"><canvas id="graficoDispositivos"></canvas></div>
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-64"><canvas id="graficoCidades"></canvas></div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-900 text-[10px] text-slate-300 uppercase font-black">
                <tr>
                    <th class="p-4">Localização & Timestamp</th>
                    <th class="p-4">Origem / Campanha</th>
                    <th class="p-4 text-right">Scroll</th>
                    <th class="p-4 text-right">Tempo</th>
                    <th class="p-4 text-center">Status</th>
                    <th class="p-4 text-center">Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-radar" class="text-sm font-math divide-y divide-slate-100"></tbody>
        </table>
    </div>

    <div id="modal-dossie" onclick="if(event.target === this) fecharModal()" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl w-full max-w-5xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-100">
                <h2 class="text-xl font-black text-slate-900"><i class="fa-solid fa-microchip text-blue-600 mr-2"></i> Dossiê de Telemetria</h2>
                <button onclick="fecharModal()" class="text-2xl font-bold">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 bg-slate-50 custom-scroll">
                <div id="detalhes-alvo" class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-6"></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-xl border border-slate-200">
                        <h4 class="text-xs font-black mb-2 uppercase text-amber-600">Keylogger (Abandonado)</h4>
                        <div id="det-inputs" class="text-xs font-math bg-amber-50 p-3 rounded-lg border border-amber-100 min-h-[60px]"></div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200">
                        <h4 class="text-xs font-black mb-2 uppercase text-blue-600">Área de Transferência</h4>
                        <div id="det-copias" class="text-xs font-math bg-blue-50 p-3 rounded-lg border border-blue-100 min-h-[60px]"></div>
                    </div>
                </div>
                <div class="bg-slate-900 rounded-xl overflow-hidden">
                    <div class="bg-slate-800 px-4 py-2 text-[10px] text-emerald-400 font-black uppercase">Console de Logs</div>
                    <ul id="det-timeline" class="p-4 font-math text-[11px] text-emerald-400 space-y-1 h-64 overflow-y-auto custom-scroll"></ul>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBjuvcJvTWw7lMrIwej5lHbIUXe99lJDN4",
            authDomain: "crmpetshop.firebaseapp.com",
            projectId: "crmpetshop",
            storageBucket: "crmpetshop.firebasestorage.app",
            messagingSenderId: "381013124221",
            appId: "1:381013124221:web:6a1860b4249c2939b6fd14"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let sessoesCache = [];
        let charts = {};

        window.carregarDados = async () => {
            document.getElementById('icon-refresh').classList.add('fa-spin');
            try {
                const querySnapshot = await getDocs(collection(db, "lp_acessos"));
                let rawData = [];
                querySnapshot.forEach(doc => rawData.push({ id: doc.id, ...doc.data() }));
                sessoesCache = rawData.sort((a, b) => (b.inicioSessao || 0) - (a.inicioSessao || 0));

                let metrics = { scroll: 0, tempo: 0, rage: 0, fugas: 0, conv: 0, mobile: 0, desktop: 0 };
                let counts = { origens: {}, cidades: {} };
                let html = '';

                sessoesCache.forEach(d => {
                    metrics.scroll += d.profundidadeScroll || 0;
                    metrics.tempo += d.tempoTotalSegundos || 0;
                    metrics.rage += d.rageClicks || 0;
                    if(d.converteu) metrics.conv++;
                    
                    let disp = String(d.dispositivo || '');
                    if (disp.includes('Telem') || disp.includes('Celul')) metrics.mobile++; else metrics.desktop++;
                    
                    let orig = String(d.origem || 'Direto').substring(0, 30);
                    counts.origens[orig] = (counts.origens[orig] || 0) + 1;

                    let city = String(d.localizacao || 'Desconhecida').split(',')[0];
                    if(city && city !== "A rastrear...") counts.cidades[city] = (counts.cidades[city] || 0) + 1;

                    let status = d.converteu ? '<span class="text-indigo-600 font-black">CONVERTEU</span>' : '<span class="text-slate-400">Visitou</span>';
                    html += `<tr class="hover:bg-blue-50">
                        <td class="p-4"><strong>${city}</strong><br><small class="text-slate-400">${new Date(d.inicioSessao).toLocaleString()}</small></td>
                        <td class="p-4 text-[10px]">${orig}</td>
                        <td class="p-4 text-right text-emerald-600 font-bold">${d.profundidadeScroll}%</td>
                        <td class="p-4 text-right text-blue-600 font-bold">${d.tempoTotalSegundos}s</td>
                        <td class="p-4 text-center text-[10px]">${status}</td>
                        <td class="p-4 text-center"><button onclick="abrirDossie('${d.id}')" class="bg-slate-900 text-white px-3 py-1 rounded-lg text-[10px] font-black">LOGS</button></td>
                    </tr>`;
                });

                const n = sessoesCache.length || 1;
                document.getElementById('kpi-sessoes').innerText = sessoesCache.length;
                document.getElementById('kpi-conversao').innerText = ((metrics.conv / n) * 100).toFixed(1) + '%';
                document.getElementById('kpi-tempo').innerText = Math.round(metrics.tempo / n) + 's';
                document.getElementById('kpi-scroll').innerText = Math.round(metrics.scroll / n) + '%';
                document.getElementById('kpi-rage').innerText = metrics.rage;
                document.getElementById('tabela-radar').innerHTML = html;

                renderCharts(counts, metrics);
            } catch(e) { console.error(e); }
            document.getElementById('icon-refresh').classList.remove('fa-spin');
        };

        function renderCharts(counts, m) {
            Chart.defaults.color = '#64748b';
            const cfg = (type, labels, data, color) => ({
                type, data: { labels, datasets: [{ data, backgroundColor: color, borderRadius: 5 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: type === 'doughnut' } } }
            });

            if(charts.origem) charts.origem.destroy();
            charts.origem = new Chart(document.getElementById('graficoOrigem'), cfg('bar', Object.keys(counts.origens), Object.values(counts.origens), '#6366f1'));
            
            if(charts.disp) charts.disp.destroy();
            charts.disp = new Chart(document.getElementById('graficoDispositivos'), cfg('doughnut', ['Mobile', 'Desktop'], [m.mobile, m.desktop], ['#3b82f6', '#cbd5e1']));

            if(charts.cid) charts.cid.destroy();
            charts.cid = new Chart(document.getElementById('graficoCidades'), cfg('bar', Object.keys(counts.cidades), Object.values(counts.cidades), '#10b981'));
        }

        window.abrirDossie = (id) => {
            const s = sessoesCache.find(x => x.id === id);
            if(!s) return;
            document.getElementById('detalhes-alvo').innerHTML = `
                <div class="bg-white p-3 rounded-xl border">Local: <strong>${s.localizacao}</strong></div>
                <div class="bg-white p-3 rounded-xl border">Frequência: <strong>${s.numeroVisita}</strong></div>
                <div class="bg-white p-3 rounded-xl border">Sistema: <strong>${s.sistema}</strong></div>
                <div class="bg-white p-3 rounded-xl border">Scroll: <strong>${s.profundidadeScroll}%</strong></div>`;
            
            document.getElementById('det-inputs').innerText = JSON.stringify(s.dadosFormulario_Abandonado || {});
            document.getElementById('det-copias').innerText = (s.textosCopiados || []).join(' | ');
            document.getElementById('det-timeline').innerHTML = (s.linhaDoTempo || []).map(l => `<li>> ${l}</li>`).join('');
            document.getElementById('modal-dossie').classList.remove('hidden');
        };

        window.fecharModal = () => document.getElementById('modal-dossie').classList.add('hidden');
        carregarDados();
    </script>
</body>
</html>
